body:
  text: 第十七回接回雁惆悵凶信詩曰一段姻緣一段磨豈能容易便諧和好花究竟開時少明月終須缺處多且喜閨中照日色誰知塞外報風波死離三載千腸斷天意如斯無奈何卻説康夢鶴差了三巡大轎二十匹馬涼傘旌旗到潮州府迎請夫人及到府城知府龐端及滿城大小官員辦燈結彩修蓋公館迎接爛然令人可愛及到了蔔世傑之站人馬簇簇知府以下官員皆差人持手本叩候嚇得蔔世傑不魂不附體暗想道莫非是高仁姚安海弄什麼禍來忽見二位女婢一個標致的官家手持一封書跪在世傑面前説太爺叩頭世傑忙扶三人起來道你們衆人認差了老夫並無兒女太爺從哪里來那管家道小的是察院康大老爺差來的現有書在此那裏是認差世傑展開一看霞漳康夢鶴百拜奉啓卜玉真即蔡平娘賢卿妝次時光易近離恨難窮想我別卿曉太行山穩穩諒卿思我時天塹水悠悠今辛上賴祖宗之靈不負芳卿之德一仙獨登五榮俱至擢拔探花飛下木鳳除授廣東察院敬遣差役迎請赴任千祈夙馳星駕無煩懸結為慰蔔世傑看完乃知是他無緣的女壻不覺流涕道吾女兒不幸被火燒死了今埋葬許久敢煩大叔回覆大老爺那管家道可憐可憐但大老爺吩咐極是嚴切今既被火燒死太爺可同小的齊去亦好和大老爺説個緣由蔔世傑道老夫不便去你若不敢空回待我寫一封書付你持去那管家遂待世傑寫書持了回去正是蒼煙迷惘遇風開衰草連天幸雨栽迎接載途設赫赫誰知好事多磨猜卻説滿路文武官員迎接甚多見未有夫人皆散而歸夢鶴尚未知至將到之日大開東閣挂起紅彩張樂設飲喜得新婚宴爾思前日做了踏鼇折桂子今夜得了跨鳳乘鸞客坐在交椅裏尋思不一時見一管家跪下道稟大老爺卜太爺有書回覆夢鶴忙忙問道夫人到否管家稟道小的奉命去請夫人見卜太爺卜太爺説夫人不好了夢鶴吃了一驚疑是高仁占去問道什麼不好管家道卜太爺有書在此夢鶴拆開一看只見上面寫道追維別後女兒每日廢寢忘食不幸命薄福淺是夜萬籟俱寂之時天降火災將女兒玉真燒死今蒙念舊益添淚流臨筆依依欲言難盡謹此拜復夢鶴看畢泣流兩行仰天歎息説道夢鶴何一個佳人尚居不得遂顛倒在椅上昏昏如失須臾叫管家在那裏管家道小的在夢鶴道卜大爺你何不請他來管家道小的強他同來他説女兒福薄我有何面目去你速速去報你大老爺得知免得大老爺翹望夢鶴歎道罷罷且説康夢鶴差人去漳州請老夫人一路燦然閭裏生色自不消説其母陳氏屢請玉真上轎玉真泣道母親你同叔叔去兒不去陳氏道吾兒何出此言一生所望夫主金榜題名今幸僥幸正是吾兒同享君祿之時説什麼不去得無薄卻夫君覓封侯之意乎玉真道兒為他受盡艱辛勞苦只望他成名顯兒堅貞之志光榮我父母今兒被姦陷害乘夜偷走到此地父母不知兒若去享富貴棄父母于受苦之地心何忍乎陳氏道吾兒同我去見你夫主著他差人去請親家親母來也未為遲玉真道也非此之謂兒聞君子不矜細行而棄大節今兒與他全未相熟忽然同母親去是貪他富貴也貪富貴即矜細行也未待新迎是棄大節也若然則兒乘夜偷走而來今復不待迎請而去究去淫奔者何異乎兒斷然不去陳氏道吾兒既有此堅貞之志不免我先往著你叔叔伴吾兒暫住在這裏於是陳氏即先往正是關睢淑女待君逑鄭重合浦名節休不比遊蕩輕薄子忽逢富貴喜心悠陳氏在路數日一日到了廣省城外長班先報與夢鶴知夢鶴忙忙出郭跪接見了母親不勝歡喜見兄弟不在左右因問道兄弟緣何未到陳氏道你弟要慢幾天來陳氏道我問你你何不去請媳婦夢鶴歎息流涕道兒命孤緣薄玉真被火燒死了陳氏道你從何得知夢鶴道兒前日去請他家回書來報陳氏道玉真既然燒死只得罷了我為娘的替你娶了一房在俺本裏生得極是醜陋但他一日病死後來回生起來説他名玉真聲聲道去潮州府尋蔔世傑説是他父親又説吾兒是他夫主名做蘭竹夢鶴聽得蘭竹二字難得知母之話有啞迹一時怎猜得破只説道即有媳婦母親何不帶他同來陳氏道他有名節之此要吾兒親差女婢去迎請他他到潮州府認了爹娘然後同爹娘一齊至此夢鶴聽了愕然道天下事那裏有這等奇怪把人生為南柯之戲陳氏變色道吾兒説蔡平娘回生你母即信今我説玉真回生而你不信豈我之言盡不若你之言而你之心遂不符我之心乎夢鶴道兒安敢以他人之心疑母心但母親説名做難得若有可異陳氏道難得是實難得誰敢説易得乎夢鶴不敢再問遂請母親入察院衙內即奉母命差數個女婢並管家再去漳州迎請蘭竹夫人但心中歎奇自想道若以為夢則母親之言是真若以為真則恍然猶是夢沈吟不悟且説康夢鶴差役起身只限三十日到及過了限期未到心下愈生猶豫不決乃再差數匹馬去請不知玉真請來未曾且聽下回分解
