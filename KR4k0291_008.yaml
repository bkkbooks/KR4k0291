body:
  text: 第八回康夢鶴客齋夜夢詩曰靜面萬物皆前來是假是真莫細裁達者談天有可信癡人説夢終難猜豈期情切幽明感不意心誠微顯開留得隻身飄落在安知離合不奇哉卻説康夢鶴在姚安海書館中沈潛讀書姚安海每日勸他求親允升道小弟今日此來原為功名非為婚姻安海道今日無事不如同到街市間遊一耍如何允升道這個還不妨乃攜手同行正是身入桃源溪徑長問針得線真奇哉白雲本是無心物又被清風引出來二人走不幾步遇著一個媒婆安海認得他把扇招他一招叫張媽住了我問你那張婆笑得欣欣説道我今日有利趲不姚官人是要擡舉我安海道你和我蔡兄做媒那媒婆將允升一看説道姚官人你不要説謊了那位官人這等花容玉貌人這等壯大還沒有秀才娘我不信安海道瞞不得張媽他前年失了一個佳配如今是要續弦的但他發誓必有才貌雙全如前妻一樣才肯娶他不然雖終身零落亦所不惜理我觀世傑之家有一個女子正是蔡兄佳偶煩你去求他一求若是湊合重重一個禮謝你那張婆道我看蔡秀才配得他過但我問你有多少聘禮安海道才子配佳人有什麼聘銀張媽道這個做不得他女立誓要才貌夫君他父又要有財的女壻每人去求他有財又無貌有貌又無才養到於今二十歲了未有下落我想他一個女必寂守孤幃鈞死然後有匹配這個任是相知亦難撮合頭搖手擺轉身而去安海道這個老賤人好大膽不要管他走罷二人遊覽街巷日將過午允升道回去罷過了大街轉過一灣望見數株梧桐四周緑竹宛如溪林幽鳳當時卜玉真嘗遊此竹圃有詩一首為證竹柳幽陰日影斜時遊樹下醉忘歸間觀粉蝶雙雙舞驚得黃鸝樹上飛時人亦有録一首為證桃開紅錦柳拖金白玉鋪成緑竹陰更有梧桐和月林珠璣錯落綴花心允升觀了一會就問安海道這一個所在是誰家景致姚安海道即蔔世傑後園他的女兒玉真常在這園中玩賞花木俺不妨到那裏看一看行了數步忽見玉真正園內井邊觀女婢汲水灌花安海引允升密迹潛行走到後園一聲壞牆處偷看見得柳煙桃露春衣月色花香飄長翳唇似桃兮腰似柳臉如花兮膚如脂立得竿般嫋娜行得萬般旖旎花魄已消焉敢護月魂如動定相依朱邊引繩舒玉筍恍然洛浦臨溪遊園內憑欄映芙蓉猶如觀音蓮花坐傅粉的委實羞畫眉的真是謊亭亭嫋嫋記不盡嬌姿娉婷悄悄冥冥描不盡香蓮步穩當時有録五言詩為證花柳雖妖冶終含草木形何如閨裏秀絶色自天生允升見了玉真斷送得眼亂引惹得心慌説道我試看吟一絶看他説什麼偶遇名花惹悶時陽春和斷求心知玉槎會渡天河路安得嬌娥許一詞玉真聽得有人在牆邊吟詠把秋波一轉看見有兩個人躲在牆後看見一個生極俊秀説道好思慕俊逸之詩但不知是那一個詠的這等思慕之深也我依韻和他一首詣惜傾筐梅落時靈台一點有天知引繩汲得漿中液不是同舟無一詞那玉真和詩畢把小小的雙腳兒輕移房內去了允升道好酬應得快出安海道憑兩個是好做一首兒的可惱走得快亦不等我飽看一會回來去罷允升見境傷情在路中如醉如癡説道這女子行動聲音好似我平靜娘一樣歸至書齋中愈想愈真愈憶愈現莫不是陰靈不泯真身出現乎又想道若是我平娘妻為什麼在這裏且我在那裏吟詩他亦捨得不認我又轉一念道莫不是夢正是情因境遇愈思前歡欲來時又淚漣此日偏能惹追憶新弦彈出疑舊弦是時天色已晚金烏漸漸西附玉兔徐徐東升那允升獨坐無聊一時困倦身倚在床板中頭枕在床欄上輾轉思想口念一絶雲坐對淺燈照悴容幾聲夜雨落絲紅因何柳絮牽花舞醉殺遊心倒檻中允升想了一會不能成寐將近半夜不覺兩目酸澀心內暗想道未知何日得見我平娘妻不免來去追尋會他一面許多受用頃刻間遂別了他鄉客尋了故國人早來到即是泉台路但見緑楊芳草萋萋金風玉露颯颯寒氣砭骨陰冷侵膚開了玉門關走到轉界司聽得裏面有婦人聲音原來我平娘就在這裏不免敲門平娘道誰敲門哩聽了半晌又道這聲音恍似我夫君夢鶴的聲音他為什麼到此待人開門來看平娘一見果是夢鶴説道難得我君恁般心勤衣袂蓋沾露泥了康夢鶴道我這幾日不曾見我賢妻為你割肚牽腸虧你昨日在井邊亦捨得不認我到如今害我這等跋涉平娘道君差了妾未嘗到陽間為何有在井邊只因俺六月十四夜梧桐樹下石片上空合雲雨觸怒天威城隍申文東嶽帝君把妾拘到陰府究問帝君憐妾賢德孝慈不甚拘究惟責罰我君損了一長子斷了俺夫妻三年風流債然後許再相逢康夢鶴道聽你這説我妻你是死了未曾到陽間平娘道正是如今這裏乃是陰府夢鶴道人死不可復生賢卿説什麼日後再相逢除非是夢中相逢或是待我同到陰會相逢平娘道君有所不知那一日東嶽帝君喚注生司官拿簿來看那司官稟道查得蔡平娘于二十二歲身遭一劫過了這劫壽至八十今身尸朽爛不可起生小神查得廣東海陽縣人氏系庠士蔔世傑之女蔔玉真生得容貌才品與蔡平娘恍惚相似玉真壽數今年皆終宜將蔡平娘神魂依在蔔玉真尸魄上無可憑據準妾心同而眼異心同者使妾將前事一一都記憶得眼異者使妾變易人身將舊人的容貌都忘記得若要重相會時必依然記得天後娘娘為媒簽詩為證正顯陰光有應妾即叩謝而出今幸我君不辭勞苦來尋妾妾正可與君同回陽間康夢鶴道俺兒子如今在那裏去了平娘道判在河南開封府去投胎出世了康夢鶴道俺如今不在漳州家裏住了現今羈身在潮州府城內姚安海書館中平娘道妾正要去潮州府城內尋蔔玉真了二人一種相隨歡歡喜喜恰如花開花謝謝更豐寶鏡重新月復朧誰積世間事是戲那知天下人皆空卻説康夢鶴夫妻同到潮州府城內夢鶴道來到這裏即是我寄寓的書齋了請賢妻入內同坐片時平娘道可有人在那裏麼夢鶴道僅小生一人而已不須驚疑平娘即入內對坐説道君這等淒涼寧不思妾乎夢鶴道一日十二時那一時不傷嗟惟望賢卿垂念小生自卿別後枕冷衾寒亦極渴念今幸得見希祈憐憫平娘道自今以後合當勤慎夢鶴道如今在書齋內非猶昔日梧桐樹下之比也平娘道務宜快些兒妾要去了兩人正在情濃之際忽聞敲門之聲聽得查必明在外叫道蔡兄好起來了天已亮了夢鶴翻身驚覺即是一夢遍體困倦忙忙起來將門兒推開一看見紅日已半壁了查必明道蔡兄好高睡兄知提學不幾日將到了夢鶴道文宗到得好查兄可急急去尋一個府名便於進考查必明又説了間話隨即出來覓府名了且按下不題但未知平娘回生之事何知且看下回分解
