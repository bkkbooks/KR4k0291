body:
  text: 第十一回卜玉真聞凶盡節詩曰百年伉儷一時休盼望未遂曾淚流秋雨梧桐悲噪鳥春風桃李惱鳴鳩只為君命牽纏苦弗顧妾身粉碎瘤不怨天兮不怨地怨儂半世逢多憂卻説蔔玉真之母林氏既許康夢鶴親身要待蔔世傑到日議成合配之禮至次早蔔世傑果到林氏即與之陳告其前日來求親之蔡允升即是今日要求的康夢鶴有詩詞情事為證世傑聞之欣然説道天下有此天作之合免我尋覓之勞相似所謂人有善願天必從之我且問你是他親來説的或是托媒婆説的林氏道是那大街上一個姓姚名安海的來説道是他朋友歇在他書齋裏你可去拜他看其容貌醜美問其情由真假請他親來俺家與吾女兒相認世傑許諾遂不遑吃飯竟往姚安海家去見得書齋帶鎖卜世傑向鄰人問道姚官人往那裏去那鄰人道他因漳州一個朋友銀尋不見兩人扯到縣裏去審不知勝負何如蔔世傑道這等請了遂奔到縣前遇著姚安海打了出來傍邊一人道天理昭彰打得好世傑拱而問道兄説什麼天理昭彰那人道兄有所不知這樁事我都曉得乃與告其情由卜世傑聞説吃了一驚奔告林氏玉真聽得淒淒慘慘哭將起來説道他為我死我必為他已如今教我怎麼救他雖然兒生既不得與之同衾死願與之同穴正是西廂所謂從今後相會少見面難月暗西廂鳳去秦樓雲飲巫山是也心內想了半晌説道是了兒不免趕上跟他同往省城訴出先時身故今日回生情由免他受刑罰方可救他一命遂放下雲鬢再梳實些兒兜起繡鞋再束緊些凶即日促裝起行你道如何誠有不盡慘淡中之素嬌無心胭粉西施顰停手針繡隱娘英纖纖玉指舒軟玉扳道雨傘光榮小小金蓮香步穩踏過露草芳亭渾身是膽遍體皆醒一心耿耿兩眼瞪瞪兜緊服飾錦藏囊芙蓉族泠弦求裝鬟鬢雲歸岫柳絮拖冠纓飛霜舞雪翳長裙定電驅風飄裙旌怛怛迢迢仍怨怨悲悲切切又世傑見他堅意要去亦收拾行李各他同往一路上風餐露濕顛顛倒倒難道這般艱苦正是猿啼鳥叫逢三秋不是愁人亦帶愁死死生生期自誓時時刻刻為君憂世傑玉真同走在路上遇一個漢子説可憐昨日江中沈一隻船淹死一十八人又一個人説還有一個才子説是漳州人也淹死了世傑父子聽得這話便住了腳玉真道父親你去向前問他一個明白世傑即叫大哥借問一起你説沈船淹死漳州才子敢問是什麼名姓那個道變是康夢鶴世傑道他為什麼事在船裏那人道因他被嶽父蔡都司在蔡院告押解在船蔔世傑聽了愁然錯訝玉真在傍聞之不覺腿軟顛仆於荒草之上世傑扶起玉真哭不出聲咽喉哽咽向世傑泣道兒今日與父親永訣矣請坐受兒四拜又向南方拜母親説感謝生育之恩今為情人已亡義可獨存遂傾身磕向石頭尋死世傑一時勸他不聽止他不住沒奈何將一身攔在石上兩手把石遍遍掩掩玉真磕在手肱邊近在石尖上是以不死但見遍身都紅昏倒石下世傑叫道千萬救我千萬救我那些行路的人都挨進來看見一個少年婦女滿面紅血瞑目不語大家忙忙脫下衣服來覆他直至兩個時辰方才漸漸回魂又停了半晌乃能言語正是幽冥永隔淚珠垂一點丹心向日葵生死不移薑桂志海枯石爛身甘痍衆人問世傑道這一個是你女兒不是世傑道正是我女兒衆人又問道為什麼緣故這等情切世傑即將從前根由逐一陳告行路之人無不歎其節義傷其禍慘因説道今日天色已晚他走不得到店裏了不如扶他到前面鄉村裏宿切不可在這裏冒風世傑即將衣服拿還路人説聲多謝衆人請了世傑乃輕輕扶起玉真到鄉里去歇及至村內聞得啼哭之聲説我兒壻去做生理昨日起風在船中沈死了世傑聽了對玉真道這消息是真如今卻怎好玉真道兒心裏痛染沈屙斷然難活必隨他去乃合道理世傑道吾兒必須把定念我二老未死所賴何人今康夢鶴已死死者不可復生為人當回心以理制私孝節兩全乃可問世無愧如必區區節烈死而後已忍父母置身于無依之地九泉下雖瞑目于無緣之夫君但天地聞豈能愜快于至親之父母乎玉真道想光陰也是無憑説兒與他系夙世前緣除非是要兒死去與他結緣今聽爹爹這説兒不免隨爹爹回家誓不改嫁願奉爹娘百年後死亦未遲世傑道一日在生勝你百日在壙死亦無益到那時再來區處世傑父子乃尋覓人家暫宿一宵孰知這鄉村中有一監生姓高名仁家積萬金與安海素甚相熟來府城裏都宿在安海書館中安海亦極趨承他舊年才失妻今要選美麗的女子為妻末有中意出門覷見玉真低頭垂頸眉蹙鬢欹恍如西施之顰喟然歎道世間有這個女子生得姿色若嬌妝梳整真有閉月羞花之容不知他這等憂愁為著什麼事免近前去問他遂向世傑拱一拱道敢問尊叔帶此女到敝社有什麼事世傑即與之實告其由今要求歇一夜未知誰家肯行方便明早飯錢即當奉送那高仁心歡意洽恰恰顔色出得和氣婉容之聲説道晚生有一間茅齋床褥具備專候那住來趕不到路站的家眷安歇就直此眼前未知中尊叔意否世傑道這等陰騭齊天遂同高仁到書齋中安歇是夕高仁宰雞烹魚滿席豐盛世傑道弟帶少盤費怎麼敢受這盛饌高仁道買賣算分請客莫論尊叔倘肯垂愛不卻微薄晚生不勝榮幸世傑道無功安敢受祿弟不過行路之人安敢受兄厚惠高仁道人情何處不相逢敢問尊叔家居何所高姓大名世傑道弟家居府城內興貞庵旁邊姓蔔名世傑高仁道這等是老先生晚生失敬了希祈見諒請問老先生曉得姚安海否世傑道姚兄與兄是何貴親高仁道不過相識而已高仁把眼光偷覷玉真索手抵著牙兒慢慢的憂想真個窈窕問道老先生之女壻是何等人曾娶過門否世傑道女壻姓康名夢鶴尚未曾過門高仁道他是霞漳才子世傑道賢官那裏曉得高仁道晚生嘗去姚安海書齋中曾相會過了如今死得可惜雖然人之生死乃命所定斷無有憂哭而能使死人復生之理實皆自損身已自誤青春矣世傑問道賢官尊姓大名高仁道晚生姓高名仁前科忝叨成均家中雖不至如石崇之巨富然魚塘數十口果叢數千宅瘠田數千畝衣食稍可過日世傑又問道兄有見位舍人高仁道晚生命薄年近三十尚未有兒子前年不幸失妻至今未有婚對蔔世傑道兄當此青春之時又兼有此家業何怕無嬌妻美妾乎高仁道晚生托媒婆遍處去求尚未有合意倘有合意者雖用千金之聘亦所不辭世傑微知高仁之意有慕於玉真只是默默不言高仁亦相辭而出惟卜玉真心神飛往康夢鶴身中任他言語並無半句入耳正是落花有意隨流水流水無意戀落花願赴陽臺一點上不聞金口説天華卻説高仁相辭出去世傑因對玉真説道天上神仙境地下富貴人玉真即應道兒視不義之富貴如浮雲之無有爹爹好去睡了明早好走路世傑道吾兒飯亦不吃睡也不睡明早路途遠怎麼走得教我怎得不苦玉真道爹爹不必多憂兒一身未死路便會走斯時玉真羈寓他家苦不可言時人有吟一詞為證詞曰靜聽流鶯棲未穩風寸瀟瀟哀鳴嘹嘹愁自眉峰獨自吟暗室寥寥幽恨嘵嘵月下銷魂有誰訴引領翹翹號呼噍噍江邊附魄願君聞精靈遼遼心神飄飄曉看天色暮看雲飛雪憂心切切千點啼痕萬點紅腸斷怮怮愁恨憀憀雨打梨花深閉門長夜迢迢淚流漻漻風吹柳絮緊掩櫺思君愮愮顔色焦焦那知高仁聽得蔔世傑説明日路途遠怎麼走得即須先雇一頂轎候他起身待到半路走不得時好把這轎擡他去豈不感德我乎俟後日慢慢再來希圖到了次日世傑拜謝高仁領了玉真相辭而去一路上顛顛倒倒一步挨過一步到了半路玉真果然寸步難移不得已俯伏在壞牆邊坐到日色將午時世傑搔首無策只是叫苦而已此時父子無可奈何只得相向而哭忽見遠遠一頂轎飛跑而來大聲叫道秀才不必叫苦高老爺著我們二人來扛小娘子世傑看見歡喜説道好了這等多謝了吾兒從權請上轎去玉真沒奈何上上轎去坐不一時即到了家玉真下轎對轎夫説道煩你去多多謝高老爺説我感激他這等盛德異日自然報酬玉真即入內與母親林氏説康夢鶴沈船淹死情由哭了一場動人哀傷未知玉真後來何知且聽下回分解
