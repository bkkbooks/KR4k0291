body:
  text: 第十二回變一策打走光棍詩曰莫道閨中計不深閨中白壁誰能侵飾忠匿怨空用力外善內姦徒用金寄語文章勤苦讀莫將佳句等間吟當年若墜庸夫手視死如生不負心卻説康夢鶴船至半江被風吹覆共十八人皆沈水底惟康夢鶴如萍水浮水面被風飄泊一心昏迷蒙昧一身如死如夢任他波流恍若睡在船中不覺泊於一山嶼許沙壩上翻身一起張眼一視嗟嗟但見浩浩蕩蕩橫無限涯茫茫杳杳絶無人煙忽仰天歎道此何地也想必猶是夢中來尋我妻蔡平娘也得無此處是泉台路乎如今叫我要往那處尋起又道我怎麼遍身這等濕透若是露水不過半身濕而已想了一想道是了我昨夜押解在船裏大抵是船被狂風吹沈流落到此但我看這山嶼儘是深江大海環圍四面卻怎了必是我命不該水裏死要在山上餓死我是真罷了我且將這衣服披在這風裏吹幹好穿起來坐在那石岩下參禪做了一個活佛誰知這幾天果然狂風興作船隻不到連餓三日餓得真是可憐時有一詞為證詞曰嗚咽口裏喉愁聞水聲潺潺瞑瞬眼中睛斜見山色斕斕金銷玉減無奈窮愁戀廢寢忘餐那恨深灣顧不得花殘月缺忍不得肚飢身艱露水沾惹雲石同板身非夷齊何以坐餓首陽山相是逃了台城要見陽襄尊顔幸得一日風恬浪靜適有商船要回漳州揚帆搖櫓順水而來康夢鶴耳無聞目無見昏昏昧昧倒在岩下甘泉邊且喜商人將船泊在山腳二人上來要索乾草去起火炊飯得到甘泉裏吃水看見死人在那裏近前一視認得是康夢鶴那康夢鶴聞有人在身邊説話張眼來看説道救我救我那商人道你莫不是康夢鶴麼夢鶴道正是那商人道你為何在此康夢鶴把手指口説不能言那商人知其餓得苦了遂把康夢鶴抱起來二人相鄰負到船裏用些飯湯灌入漸漸把清粥與他吃至第二日乃一一説出一篇冤枉艱苦滿船聽了無不歎傷駭異至第五日抵漳即送他下船夢鶴感他救命之恩稱謝不已臨別問船家姓字遂一一記在心中説道弟日後得志之是自當重報正是臨險不險臨危不危天地鍾英一大器推遷自有人來持卻説康夢鶴下船恩母與弟未知是在監中或解落廣東去了行邁靡靡中心搖搖到了自家門首聽得裏面哭聲夢鶴寸心如割再進入去乃是和胞弟在這裏哭他沈船死了忽見他回來不勝歡喜夢鶴道母親不必哭兒在此兒聞母親與弟禁在監中怎得出來陳氏道官説吾兒沈船死了是以放俺母子出監吾兒於今那裏得活夢鶴道母親請坐待兒慢慢説來即將遊學雇考至沈船事情自始至終一一説了一遍陳氏聽了歡喜兒子活了性命又聽得平娘回生將信將疑似奇似巧喜慰交集不題且説霞漳諸朋聞其祥回業皆來相探詢其遊學來歷惟鄭判軀用銅銀陷害他不敢來見那洪袖中聽得夢鶴有一樁婚姻事恨無聘金難得成就心竊自思以為我來去請他吃酒細問他因由亦好來去娶一個嬌妻及至次日即辦了酒去請夢鶴説道久別社兄渴慕駕旋今幸榮歸大慰鄙懷敬備蔬酌為兄作軟腳局希同賁臨勿卻夢鶴道弟命薄多蹇種種莫訴死中歸來僅存蕭條微軀而已今無可為又辱寵召愈增愧顔若承兄命能無貽羞二三知己乎洪袖中道不過使運未能何羞之有兄若見拒是棄小弟于門牆之外矣夢鶴見其難以推辭乃同他去夢鶴歎道這酒都不該吃洪袖中笑道酒不該吃連飯也不該吃了康夢鶴道果然有之弟連餓三天無勺水入口洪袖中道足證天降大任之際也敢問社兄遊學功名事體何如康夢鶴道弟之功名所如皆不合及要回家蒙朋友送路費五兩被一姦賊偷去且偷去也罷又起無良心去告害弟洪袖中道那人什麼名姓在那裏住康夢鶴道在府城內大街上姓姚名安海洪袖中道這個可恨可惱敢問社兄有遇婚姻好事麼康夢鶴道弟有一奇逢佳人他父親姓卜名世傑其女小字玉真為我相思病死後來回魂起來聲聲説是我前妻蔡平娘回生會曉得我當日媽祖天後為媒簽詩為記的詩章稱説不論那人有此詩章對合就要嫁他洪袖中道這等奇事兄何不去娶他康夢鶴道先時他父親貪利不慕才名佳譽後來適逢小弟命薄屢遭不遇是以婚遲洪袖中道要天妃什麼詩康夢鶴即誦與他聽洪袖中又問道弟聞兄與令先嫂倡和的詩詞甚多未知要合什麼詩康夢鶴道不必多只有注生廟內二首詩就足矣洪袖中道敢求筆筆賜小弟為照席明珠得以朝夕諷誦未知兄肯賜下指示我乎康夢鶴道夜光在前魚目焉敢此倘不鄙棄敢録巴人之章兄勿吝刪抹是幸康夢鶴即寫兩首詩與他看洪袖中接過手稱譽歎賞不已正是從來黃雀與螳螂得失機關皆暗藏漫喜竊他雲雨賦已將宋玉到東牆二人吃得及酣至醉而別次早洪袖中具備銀兩促裝起行直至潮州府城內大街上訪問姚安海名字適遇姚安海在家懊恨被責之辱心內自想道有天理如今他沈船身死正消我恨忽聞有一個漳州人在那裏問他名字出來拱一拱道你問他怎麼洪袖中道弟是漳州人姓洪名袖中遠慕芳名專來拜訪顔範姚安海道還有什麼話説洪袖中道有一個知心話是有利的安海聽得有利遂説道安海就是小弟賤名袖中喜道這等有緣第一件事大抵十分得成了姚安海乃請他入坐待茶問道兄一件什麼事洪袖中道弟幸早失妻聞貴府城內有一個蔔世傑的女兒生得標致弟要求兄為斧柯以成人之美姚安海道這事甚難他要候康夢鶴對合什麼簽詩如今康夢鶴已死兄雖可假做康夢鶴但不曉得他之詩卻怎麼好袖中道這個不難簽詩詞賦弟一一都曉得蓋康夢鶴與弟為鄰其詳細審之熟矣姚安海道這個就做得那時姚安海遂設席與洪袖中劇飲談論二人非説夢鶴之癡即説夢鶴之短是以相得甚歡至明日姚安海喚一個媒婆就是卜世傑族親卜媽媽蔔媽媽道姚大官人有何擡舉姚安海道要擡舉你趁銀子把手指道袖中道你曉得這位是何人就是蔔玉真要求的康夢鶴卜媽媽道聞康夢鶴沈船了洪袖中道我幸神助漂流江邊遇別船救活卜媽媽道這等恭喜是我小娘子三生有幸了即到蔔世傑家説知那蔔世傑也正在鄉間才回兩人一齊入內蔔世傑問道媽媽到此有何話説卜媽媽道來與叔叔賀喜聞叔叔要求康夢鶴不知者以為夢鶴沈船身死誰知他漂流江邊幸遇商船救活過來前日與安海有隙今二人相認説合投契如初世傑道安海為人姦險他已熟悉今又故意來宿他齋裏未必是真這個我也不管他只要有簽詩對合便好卜媽媽道明明是真實的人難道我好騙你若要簽詩我就去拿卜媽媽來回復袖中袖中即寫簽詩並注生廟二首詩與他持去世傑見得此詩持入與玉真看玉真看完臉生春色唇露白玉眉開眼笑説是了是了且喜謝天謝地正是昔人偷玉今偷詩玉是真兮詩是欺設網求魚錯入雀種桐等鳳認棲鴟即日洪袖中備聘金二十兩買一個全紅寫為文定之敬卜世傑亦備朱履等物買一個全紅寫為回福之敬擇一個吉課約五日之外即要花燭之會得全詞巹之禮惹得世傑夫婦歡歡喜喜打掃廳房鋪藤床蓐一完齊齊整整至期洪袖中心中喜中了計説萬事非所願惟得一佳人足矣你道喜得怎生模樣但見他頭載一頂方巾強作斯文氣派身穿一領藍衣假裝才子豐雅形神鄙陋有類荒煙照蓬草骨相凡庸渾如狂風吹枯木笑時兩肩聳頭上行時雙腳駕胸前蓋藏內美掩盡姦狡行蹤炫耀外色裝不出詩氣風味至晚洪袖中穿得衣冠齊整搖搖擺擺到蔔世傑家世傑欣然出迎是時世傑設席在外廳請客一席在房內與他合夫婦之禮洪袖中到卜家陪客在堂吃了三杯酒後即入房內見得玉真梳妝打扮恍若臨溪訪洛神對月賞嫦娥渾然不知天台與人間遂向席上提起杯來篩一杯酒兩手恭恭敬敬捧來要與玉真飲然玉真雖是平娘回生只記得前日所做之事情不可得夢鶴的面貌那知玉真把秋波一盼靈犀一點曉得行狀舉動大不類風流才子心下暗想道不免考他一題倘是夢鶴一試便就玉真道酒且放下俺不比庸流之輩要成夫妻之禮必行古人之法一人各吟一首詩以今夜即事為題洪袖中聽得要當面做詩真是青天上一個霹靂嚇得魂不在身須臾説道念良辰無幾小生心在佳期之會神馳恍惚那裏有詩請待後日與賢卿吟風吟月也未遲玉真道後日是後日事今晚無詩難説得話洪袖中惹得滿臉如火心朵亂跳沒奈何裝出文人體態口中糊糊塗塗將頭暗點了兩點但無一字落紙怎麼是好玉真道許你出外觸境起興罷洪袖中聽了此話喜得窩裏都是癢的定了精神暗想道我可去席中托人代替把兩手搔在頭上慌然出去玉真知是假的暗想道如今墮落他機關若飛鳥之入籠中教我怎麼脫出思想半晌無計可施忽然想著必須如此如此遂變得一個頭發散直如收鯉魚的南海遍身烏黑如治龜蛇的玄武手執起楊柳枝腳脫下繡弓鞋披衣露體睛轉聲烈真個令人嚇怕斯時燈火不明不亮及洪袖中一入來忽然跳落一個黑鬼嚇得洪袖中魂飛魄散抽身要走被黑鬼把粗大的柳條亂打洪袖中心慌叫不出聲兩腿軟綿走不出來雙手俯伏在地做四腳爬走出來説房內有鬼大家救一救這鬼徑趕出來擒著洪袖中胸裏痛打一場打得一身好厲害哩這黑鬼又將席上饈味一盡掃蕩滿席之人無不駭異蔔世傑道你是何方鬼怪敢入我家害人那黑鬼道你不曉得我乃玉皇上帝殿前毛獅王便是上帝差我來打陽間拐騙康夢鶴妻的棍徒我差玉女仙姬將玉真化去還夢鶴將這光棍要活活打死蔔世傑與同席中之客都跪下道懇求毛獅王乞饒這人性命念他是外方人氏放他去改過自新蔔世傑哭訴道望毛獅王千萬放我兒來憐我未有男子那黑鬼道你女兒放不得這一個畜生準大家求饒各各退避我依舊要歸天曹去了那黑鬼將柳條把兩班人揮打兩班人一閃那黑鬼就沖出捷捷轉過一灣沖入竹叢內慢慢手扳竹枝跳過牆去伏在芙蓉花下那衆人一齊趕出四處挨尋果然不見蹤迹點起火來抄覓杳不知其所之也一個説他騰空駕霧上天去了一個説他變化不測那得見他上天蔔世傑道上天與不上天慢些説大家且同我入房尋個女兒衆人即去抄看寂寂無影連衣服首飾都不見了卜世傑夫妻哭將起來大家無不感傷卻説洪袖中打得手痛腳酸面破膚黑神不輔心形不輔體聲聲説道勸人莫做虧心事舉頭三尺有神明衆人問道兄這等説你果是假的洪袖中道瞞不得諸兄我實是假今幸毛獅王饒我性命日後再不敢做非理之事大家聽得這話皆舉頭相視説現報得緊必如此才得福善禍淫有準大家勸戒一會分散而歸洪袖中如掩尾狗一般依舊回姚安海書齋中歇到次日起來收拾回漳州去了惟世傑夫妻在那裏抱哭説夢鶴已死吾兒必被玉女扶支陰府相認了那玉真知衆人散了從後門叫爹爹不要哭快來開門世傑忙開了門説道吾兒怎麼會來玉真道爹爹你就認不得了毛獅王就是兒設計假的即與之説世傑道那一個光棍在此房內兒怎得一身皆黑衣服脫不見了玉真道兒知他是假的騙他出去兒即剝去衣服首飾藏在後門花架下折落一條楊柳枝把竈裏黑煙抹得遍身烏烏的張起聲音使檢認不得是女兒騙他將女兒化去絶他念頭使他不敢來討聘金他若是敢來討聘金爹爹就問他要女兒世傑聞之怡然爽快説好計好計正是姦狡之人實呆癡深閨豔女有英華聘金費了仍羞辱天理昭昭報不差不知玉真後來如何且看下回分解
