body:
  text: 第十五回處勢窮設計脫身詩曰淡淡青天不可欺人情反覆似沒瀰休誇外闥多英敏堪歎內閨有才技歲晚知松松恨遲陽春尋柏柏無知可歎一二豚犬子翹首高恩飲玉卮話説康夢鶴被太爺差押歸籍高仁即用銀囑託差人待押到半路險隘之處將刀刺死埋藏身尸幸得許文泰等聞知伴他同往厚待解差行至半路解差才露言道康相公是你福人天相幸有這二位相公伴行不然高仁買囑我們要如此如此如今交這二位相公去我們要回去了自是康夢鶴得平安歸家逮歸家之後不勝悒悵思慕之情日益憔悴遂援筆題一首以記悲雲劍佩翩翩別一天倦飛思還到鄉田昔時風景皆無異今日妻兒盡不然村鎖寒煙空寂寂路明芳草碧連連敲門無語雲封閉愁聽庭前啼杜鵑詩才吟完忽本省鎮官聞知康夢鶴大才要請他去設帳教化子侄遣役到家拜請那差人道俺老爺要請康相公為西賓現有關書名帖此夢鶴顔色憔愁心內自思道此必是蔡斌彥知我尚存行文再來拿解了否則必是姚安海高仁又弄起鬼來這關書猶是海陽知縣之故套也不如瞞他罷因説道我乃姓蔡名允升也你去請別人我不會教書那差人道我明明曉得你是康相公怎説不是俺老爺還有吩咐説本該親來但念軍務絆羈希祈早去相公若是不去下役如何回復如同我去見老爺面辭何如康夢鶴又想道倘是非禍所及必著有司官來拿何必行文武辨諒必去見他亦無心乃同他去垤衙門那差人道相公請住待我去稟過老爺來請相公入去少頃那老爺果然出來迎接夢鶴心中稍安自是夢鶴在衙內設教讀書不題且説高仁既審出來心下拳拳只在玉真身上又聽姚安海唆謀賃一間房緊領著世傑的宅日則誇耀華美以動之夜則吹蕭鼓瑟以引之藏籬躲壁以窺其意鑽穴穿隙以覘其容蔔玉真寂然渺不相涉聽管弦如流水觀華美如浮雲正是遊蜂有意在花邊空惹竹離含笑妾想多因不自呈千姦百巧總徒然玉真每日坐在孤幃鬱鬱不快思著後園花木也懶去玩賞時人有歌油葫蘆為説詞曰翠被生寒壓繡絪休將蘭麝薰香殘燈挑盡難成夢莫把珠淚添然想那時錦囊佳篇思那人玉堂蹁遷這些兒坐既不寧睡又不眠那見日登臨不快間行又煩情絆意承泣涕連連神魂飛經在君邊那一日薔薇盛開玉真同女婢名晉錦出來遊觀偶被高仁窺見高仁遂將錢擲落花叢下甚多玉真視之略不相干依舊入房內去惟晉錦在後高仁放起膽來脫所穿衣巾擲在晉錦肩背上玉真想道這畜生甚是無理之極若不早預防他異日必惹起大禍且一日又聞高仁遣人來與世傑説道秀才若告以女兒許他他願與聘金三百你若不許他他要生一非禍將你前程黜了仍要害你性命嚇得蔔世傑驚惶説道我那有不肯之理奈我女兒執性教我怎處倘高兄若有計設施勸得我兒心願弟皆聽命那人道只求秀才將聘金收了他一介女流有何才能高老爹自然有計亂絡他不由他不願卜世傑與林氏商量不使玉真知道竟收了聘金玉真聞之坐立不安千思萬想正是松筠節操耐霜天鐵石不磨一樣堅咫只霞漳隔若漢不知何日會團圓大夜月明如晝高仁姚安海在內飲酒歌樂玉真乘此時出來散步行到竹籬邊見一隻死狗甚大忽然想到吾計有所出矣把死狗寬寬拖入房中其房在後園離他爹娘睡房稍遠較高仁一間宅又近嘗特因高仁來此住都在爹娘房裏睡今晚説要獨睡他爹娘因收了高仁的聘銀稍有不管之意玉真即將自己衣衫脫下將那一隻死狗裝作人形丟在房內床中積多乾柴在內乃將高仁所擲的銀為盤費所擲的衣巾裝做男身自想道吾父被他勢壓收他聘禮倘使得知這計決行不得若帶晉錦伴行未免步疑不如都瞞過罷玉真乃俟至更深人靜之時放火盡燒本身即乘夜逃出好得此火一發洮如神助無暴迫之聲以驚動人是以玉真爹娘睡得穩穩的那知柴幹火烈自風上吹落風下時高姚二人吃得醉昏昏的睡在床裏被火燒得痛覺翻身墜落床下爬將起來二人自相沖倒但見兩人翻來覆去如鳥鼠墜落水缸爬不得起一般口又被火煙熏得不能叫只是兩手做四腳爬走顧不得衣衫燒壞忘不得骨肉痛爛一撞出門亂走亂跳大聲喊叫驚得鄰人大家起來打火蔔世傑正在眠中被他叫醒出來看時火發在女兒房裏慌忙去救叫玉真吾兒你快出來連叫數聲並無人應至火滅入內一看嗟嗟玉真已燒死於床下矣世傑夫妻痛哭一場大家挨攏來看果然燒死了高姚二人聞玉真燒死亦走來看只見其色如杉炭其形似是蟆高仁忽歎一聲道嗚呼哀哉我的心肝天殺我也不覺泣淚數行時人有譏其不自量吟一絶為證漫言一笑值千金半句感情惹淚淋燕雀妄思鴻鵠友多貽世上説癡心於是世傑備了棺木埋葬明白不題未知玉真逃出如何且看下回分解
