body:
  text: 第十回被奸人陷害沈船詩曰一葉輕舟鼓浪行西風吹起惹心驚思予不挫窗前苦處世難求宇內平人禍忽臨儔可測天災俄到誰能爭茫茫四海本無事都是讒奸擾亂萌卻說蔡允升明日要回家其肝腸恍然寸斷一心思這奇逢良緣我若歸去兩人各別東西何時再來相會若不回去查兄又送盤費我心雖無邪不怕鬼然寧可信其有不可信其無倘異日惹起禍來教我怎麽好嗟嗟我這一片心緒有誰訴一點丹心有誰知惹得我這哭聲似鶯囀喬林恨得我這淚珠似露滴花梢允升在這書館內愁悶那知許文泰陳天英諸友因蔡允升明早要回去設一小席辦幾碗菜來扳允升歡飲聊以敘將別之情早來到此館邊聽得允升在裏面愁怨之聲戀戀不忍去之意乃入去說道蔡兄胡爲鬱鬱不快大家今晚要扳兄敍別片時醉中可以分允升陪了笑臉說道多謝了須臾姚安海亦到衆人道姚兄都一齊來去姚安海道小弟這幾時身體不安酒半點吃不得今見諸兄這等高情雅誼小弟對蔡兄愈增愧歉諸兄請了小弟不能奉陪允升道姚兄尚未出去鎖頭交你鎖匙交我晚間好來睡允升即同衆友到館次第坐下陳天英道流光如駛自蔡兄之來轉盻裘葛更矣今欲頓然別實難以爲情允升道小弟蒙諸兄雅愛一逢相投誼堅金石今欲告別心內惘然如有所失展轉懷想真想以爲情查必明道兄不幸尊嫂棄世在家複無別個生涯若是歸去愈生惆悵不如少留幾日庶弟得以飫聆宏誨倘執意恝然毋乃嫌弟不能爲居停主人乎許文泰謔而笑道居停主人恐亦不免衆人皆抵掌而笑陳天英道蔡兄非寇准你可安枕無患允升道朝夕聚首弟之素志是以不憚跋涉關山今得蒙光寵不勝雀躍若要分手陽關特以囊篋蕭然不得已催迫矣陳天英道士君子論文談心以水可以樂饑小弟雖不如查兄洽庖盈設但啖粥清蔬兄若不厭甚至一年半載弟亦可供固敢失墜何必說囊篋之匱乏也許文泰道不必多言蔡兄決去不得大家酒要吃幹允升道酒好了小弟今晚儘量差不多要醉了許文泰道醉就在這裏睡允升道小弟蒙查兄饋贐五兩並包袱都在那裏不便這裏睡查必明道兄贐儀合當隨身怎好放在包袱內請問兄你來時安海在書館否允升道門兒是交他鎖查必明道不好了不好了兄你不曉得安海爲人心腸奸險我們和他相與是把他爲兒戲好耍的陳天英道草木無知尚向春榮他亦人也豈無垂念之心大家暢飲直至雞唱才散卻說姚安海見允升出去吃酒心竊自思道他是福建人也我是廣東人也猶如風馬牛之不相及他明早要去後日那裏有相會之期怕他怎麽不如把他這銀子偷起來他若是默默不語也就罷了他若是要討我就把他的真名反在縣裏猶得賞了二兩不是湊來共七兩任我終身賭錢那有這樣趲得快遂將銀子偷去行李依早舊放在床上正是不識面中有義士最相知者是奸人休言災難有胎藏自古財利惹禍根卻說蔡允升吃酒回來聞查必明之言必中帶疑遂把行李開看銀子果然不見說道不好了不好了如今教我怎麽歸去心焦神勞攘至天明見姚安海施施而來說道蔡兄還未動身允升陪著笑臉說道社兄別事好耍銀子不是耍的安海佯爲不知說道你有銀我不曉得允升道弟有銀五兩藏在這包袱內今包袱在而銀子不見倘是外賊必將衣服盡偷去明是兄與弟戲耍教弟後日知謹慎了姚安海道我昨夜不曾書齋中睡果不知你有銀子允升道弟鎖頭都是交兄銀子怎麽不見姚安海變了臉厲聲道真果知人知面不知心我好意把書齋借你宿今要回去就計藏奸妄猜爲盜你若無盤費就實實對我說我可去化那些兒送你怎麽以盜賊目我是不以我爲德反以我爲仇這個人真無良心允升道你銀子好好還我若是不還我我遍處投告朋友你就無體面安海艴然而出把手指一指道你這等無理不要走就立一張狀竟往海陽縣口對長班道我曉得康夢鶴直來報說求賞另有一狀煩傳稟那長班即入內稟道有人來稟報康夢鶴在這裏另告一狀呈上縣主看上面寫著告狀人姚安海爲屠良嚇騙事禍因漳州棍徒康夢鶴改名蔡允升僞託士名假借書館並無系帶一物不料於昨日突生無良聲稱失銀希圖嚇騙似此流毒無法無天勢得上告縣主看了立批朱簽即著該差同原告速拘奸棍康夢鶴即刻到縣究問速速那簽差同安海來拿蔡允升將朱簽與允升看允升看了愕然精神亂少頃把住了心亦立一穎訴狀懇衙役轉進內衙呈上縣官看上面寫著訴狀人蔡允升爲叩天追究事緣升家居漳州抑鬱無聊遊學半載多感良朋饋贐五兩誰知投宿一日猶恐安海書齋不測夢覺半夜反爲郢蹻山泊慘然包袱尚存床中世傳白金忽空衣裏倘是別賊必盡偷館內所有之利明系他奸才竊行李所藏這銀典守者誰任其責狗竊者欲諉何人迢迢道途舉目多山河之感蕭蕭劍佩跬步有窮途之嗟人心不忘詎無垂憐之念天道不遠豈容奸究之徒能欺窮儒難逃冰鑒哀哀泣訴縣主看畢心內有想道我觀蔡允升這張訴狀其筆秀雅如落花流水深溶溶其聲哀愁如風清月朗鶴唳空既是遊學的書生必然飽學可知但細查這二張狀明是姚安海偷他銀子借他漳州人誣陷蔡允升爲康夢鶴亦未可知那裏憑據若要嚴刑著他自認我看文學又不忍想了一會拿一張紅貼子寫著幾個字藏在袖內遂敲板出堂吊原告姚安海被告蔡允升聽審縣主看見蔡允升人物翩翩愈加敬愛問道你銀子在那裏不見蔡允升道小生銀子在包袱裏約明早回家那時蒙諸友扳去餞別吃酒包袱交在安海書齋內到次早打開一看不見了銀子縣主對安海道你這畜生人面獸心知他要歸家偷他銀子是真重責二十板逐出又對允升說道你是漳州人氏曉得康夢鶴否本縣要見他一面允升道康夢鶴有何犯罪知縣道那裏有犯罪本縣聞他才學要請他設帳教示小兒遣人去霞漳請他家說遊在這裏本縣著衙役方問有此人來回報賞銀二兩你若不信我現有關書在此送與允升看只見紅貼上寫著遠聞其祥先生腹笥五經心貫萬古不讓關西夫子敢想高駕賁臨宏開絳帳沾濡有造倘異日獲傳衣缽皆借裁培之力也謹題束金五十兩聊爲紙筆之資希勿峻拒適慰鄙懷允升視之不覺怡然心竊自維說俺讀書君子無罪戾無犯法官長拿我何事大抵要請我設都是真的因對縣主道老爺果是要請他那康夢鶴小生便是縣主道你果是康夢鶴請起來又問道父母號名不可解你既叫做康夢鶴爲什麽改名易姓叫做蔡允升莫不是犯罪逃諱麽允升不無言但說小生惟書是視非事不染有什麽犯罪縣主著承發科吏持一張文書與允升看廣東察院李爲究賞女命事據都司蔡斌彥狀告前事本院已經移文漳州現拿康夢鶴之母陳氏並胞弟二名在監候解惟夢鶴一名據陳氏稱逃潮州府實是慮罪罔法已極合票仰該縣官吏照依詞內事理遵行細察緝拿鎖解到本院嚴究慎勿私放速速允升觀畢昏倒階下縣主傳該差即日押解又問夢鶴女命之由夢鶴即訴其妻蔡平娘病死苦情縣主憐之叮嚀該役道夢鶴不幸妻子身故系命數皆終今罹此禍實非其罪念他斯文不奈風霜休走旱路本縣出銀三兩與你等雇船去船中不許你等拘束他及許文泰等聞知齊往保結而夢鶴已解上船去訖正是惻隱稱仁人孰能認得真若非是才子安肯發心憐卻說康夢鶴解在船中一心思想蔔玉真是他前妻蔡平娘這等奇事又一心想著故鄉老母幼弟被禁在監不能盡其職分眼淚汪汪拂淚偷瞧見得水波飄搖浩蕩不測遂吟一詞以記悲雲猿聲亂雜水聲噪嫠婦怮怮罪人怮怮風流鼓起波流急江水悠悠胸懷悠悠淚添刀曲黃河溢潮信長流眼淚長流恨壓三峰華嶽低目斷故邱心憶故邱昔思舉案齊眉樂從此休休自此休休今日一線泉台近終日憂憂連夜憂憂又見波石有感口吟一絕雲石疊高兮波疊興波搖石動身兢兢波來問石何堅美石卻問波那日靜是夜開船之時風靜月朗水波不興那知到了半江康夢鶴口念未完驀然一陣狂風恍如龍吟虎嘯走石揚沙把船頭覆在水裏去了共淹死一十八人未知卜玉真聞死如何且看下回分解
