body:
  text: 第一回解簽詩指腹為婚詩曰邊理枝頭並蒂滋天才國色系生成人間祥瑞無難遇世上絲羅有可期太液芙蓉原解語昆山美玉自輝奇也知緣分從前定造化安排本不移話説皇明間福建漳州府有一員外姓康名振業系乙酉科貢土其為人沈靜寡欲不貪名利懶於逢迎性善交遊曠達名士嘗自思城市囂塵湫隘卜築鍾山之下其地尾南閩而首東粵山熱之後聚止水澤之所繞旋鍾靈吐異觸目成趣號海濱鄒魯嘗有六景為記西塞鳴笳河右望涕蔀屋弦歌晴沙灑網曉渡揚帆登臺候日員外每日志在高山流水優哉遊哉聊以卒歲不以功名為念時逢陽春佳節城中有一千戶姓蔡名斌彥其妻許氏與康員外系表兄妹自幼嘗從員外讀書性極溫柔賢淑其詩雖未十分佳制然體段亦諳練有素矣一時蔡斌彥扳約數位知己駕言出遊芳草實聞鍾山天後娘娘其神甚靈有求必應要往問簽信求止男女路經員外門首過適值員外方才出門只見一簇官人衣冠齊楚蹁躚而來中有一人心曠神怡打了一恭嘻嘻問道員外近來無恙山水之遊樂乎吾諸兄弟特來拜訪屬目視之乃表妹夫蔡斌彥也員外慌忙陪了笑臉答道蒙屈高駕有辱下顧使弟草堂頓然生色光寵何極拱了一拱説道請入寒舍略敘片時衆人道不來不了來則相擾未免有妨員外安然自在之樂員外道説那裏話於是衆人遜讓而入排行次坐獻茶畢員外道我鍾之景至勝概雖不比杭之西湖蘇之虎丘京口之金焦二山然天造地設幸有六景之奇觀亦足以供騷人逸士之遊娛今際此春光生媚惠風和暢正俺諸兄遊玩時也弟有鬥酒藏之已久容獻數杯然後同諸兄觀山玩水尋芳訪古適我願兮諸兄以為何如蔡斌彥道既有佳釀且慢安排弟有一心事未便恐後不成員外道酒逢知已千盅少話不投機半句多兄有心事何不向知己言之斌彥道實不相瞞員外與諸兄弟內拙身孕有六個月未知是男是女聞天後娘娘顯靈一來問蔔二來拜候若吃了酒豈不是拜候之禮有失而問蔔之心有簡乎衆人拱道恭喜恭喜員外道不瞞列位弟方才出門時也是存此虔誠幸遇見諸兄是以虔蔔神心頓忘而殷勤友懷忽生今既有此同調悃敬神如有知諒必降示衆人道敢問員外亦是積德在躬要問麟兒之慶乎員外道生從其類弟豚大耳何足福祿衆人與蔡斌彥齊道員外如此過謙教我輩何處藏羞員外即著家人捧盆水來兩人盥沐淨口彈冠整衣員外要諸人同行衆人道我行路腳酸停一時來罷員外請先步員外即留諸友在廳坐吃茶自己與蔡斌彥跑到天後宮二人參拜畢蔡斌彥讓員外先求員外求得二十作宿亢金簽蔡斌彥求得張月簽隨即拜辭天後歸在路中彼此相語員外道簽已求了但此神機誰能解得斌彥道吾友姓鄭名錦園者頗有偏竅善會決斷吉凶前年亦經考了府案批首正在較量間卻到家了依次坐定那姓鄭的問道這場喜事卜得何簽員外道弟妹夫説兄有默契神明內蘊能決玄妙幾微敬賴三更之棗一點頑石之悟幸甚幸甚鄭錦園道弟安敢當此褒獎非敢雲百之中盡無一失也但蒙過愛敢竭鄙意一決員外即與之説得了亢金簽錦園道恭喜恭喜員外早晚定有懸孤之慶玩其詩雲龍會明良在眼前共飛萬里銀河邊蓋龍乃陽物也陽非屬男乎眼前二字那個不曉的分娩緊了又問蔡斌彥求得何簽斌彥道弟得了一枝張月簽鄭錦園道生國莫喜生女莫悲異日定作門楣之貴兄休怪我説此是女也其詩雲廣寒宮殿右清虛州州元精玉液夫廣寒宮乃月也月屬陰陰豈非女乎右清虛三字其人必秀麗惠淑可知鄭錦園又笑了一笑説道弟另有一異見偏斷未知有當二尊意否員外道兄若等於庸俗之輩平平無奇何以異於嚼蠟之味乎願傾耳異斷以征靈犀一通錦園道論此簽之意似月老系絲已定了著天後為媒簽詩為憑之意二人正襟危坐而問道兄何以知道千祈不要胡言哩錦園道非敢胡言憑簽詩斷試將員外二句詩道來大詩之後不曰奮飛而曰共飛且潛龍在淵飛龍即在天而知飛在銀河夫銀河乃張騫乘槎到牛女之處想起來豈非著你們兩人相共而得牛女相見時乎矧蔡兄之詩説元精玉液愈見姻緣注定了夫玉液乃裴航會雲英在藍橋之區此故典諸兄豈不聞的依弟愚見此女後來有神仙精氣此男後來有別重會才是此詩之意二人聽了半晌亦有十分信服他滿面笑臉起來蔡斌彥道依他這説俺不妨就指腹為婚罷員外道豈蔡兄你便生女而弟便生男乎蓋屬未必然之事也弟安敢妄想為哉衆人道即同生男亦是舊媾兄弟究何聽風於今日之盟乎員外道既然如此就仗鄭兄為斧柯罷事若湊巧便當重謝又對斌彥道你我二人務要指天誓日後不可負約談了半日而酒肴果品早已安排在廳及坐席時但見酒煙已微花香已細員外即叫家人將酒滋熱肴肉漸漸更燒來大家酣暢飽飲獻酬交錯直至上燈才散正是未出母胎緣已定禦溝流出玄鍾成庸流能識天機事撮合絲羅言語端是夜銀河耿耿明月澄澄康員外不脫衣冠擁坐在床驀然一鶴縹縹渺渺掠於西而東忽而附于泥塗之涸轍戛然長鳴員外欠身起視你知此鶴生得怎麼模樣但見噩噩焉潤澤未羽藹藹焉潔淨光華翅如車輪長而美身似玳瑁文而秀頂若珊瑚彈而挺渾身錦繡遍胭脂鳴一聲哀一聲渢渢然若彈瑟琴愁漏水嘵嘵然訴哀泣怨東風唬得人心忽忽惹得人恨匆匆既不是黃鶴鳴空諒殊泣麟悲鳳康員外猛然驚覺起來乃是南柯一夢忽聽得房內呱呱生孩兒聲員外慌忙入觀見其兒生得形容俊偉相貌魁梧眉清目秀一身渾包錦繡遍體盡染胭脂恍若夢中一鶴不覺驚訝急喚家僮取了文房四寶磨得墨濃將夢裏之事一一描寫封藏書箱內知此兒前途偃蹇後來必然顯達俟他長大交他收管足征奇異遂名夢鶴字其祥過了四個月而蔡斌彥不出錦園所料果生女子斌彥夫妻相議説道我軍中人也今幸天下無事四海澄清此女子應運投生名做平娘罷許氏欣然且莫題卻説鄭錦園聞知員外生得是男斌彥生得是女喜驗他所斷不差且錦園乃一腐儒書生極是貪利的人記得員外説事若湊巧便當重謝念念不忘須索走一遭報知員外及見了員外説道天緣注定合當行聘以成婚姻員外道這事亦二家通知才是錦園道弟與蔡兄道過了他説今日清潔日子不可愆期員外道姻緣也是好事諒蔡兄必許諾乃辦了聘儀交錦園到蔡家撮合婚媾之雅其康家儀物之盛蔡家歡喜之極俱不消説且説鄭錦園正要往員外家討謝禮慌忙至家那知他妻亦生一男叵口細目骨露眉浮腹大於胸乃名鄭腹字判軀不題但不知員外後來如何且看下回分解
