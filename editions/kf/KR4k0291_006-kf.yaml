body:
  text: 第六回遭大變妻子俱亡詩曰寒風拂帳冷單衣睡覺沈吟悲寂幃薄暮搖燈玉影動平明斜日鏡容輝離衿一旦杜鵑啼共枕十年蝴蝶飛望斷巫山隔萬里可憐燕子同西歸卻說康夢鶴縣考批鄭案首府考亦奪魁名鄭判軀落在孫山之外及文宗按臨鄭判軀慌忙求買府名進考幸買得續榜一名名做乜物生因那提學入省去拜察院察院與提學說詔安縣有兵部侍郎乜一芝乃本院恩人其子孫名做乜物爭因前年已經本院觀風拔他案首今此歲考全賴老先生鼎爲玉成那提學連連應諾遂楫而退卻說文宗到了即吊漳州府十縣童生到泉州聽考約有半月路費並伺侯揭曉計銀必須五兩才做得事平娘道今無盤費怎麽處康夢鶴道不妨任衆人先走我帶一本命書沿途算命省卻盤費豈不是好不過功名念切貧窮無奈怕什麽羞決計已定明早遂行那知文宗科期日迫把遠縣童生先試有盤纏者皆赴及惟康夢鶴挨延算命日久及到府城打聽考期已考過完場了要入別縣又被革除冒籍峻嚴一時沒法只得去懇求送考知縣求他代稟宗師補考知縣道三年一望你讀書所幹何事爲何今日才到康夢鶴道望老爺垂憐童生家貧缺少盤費沿路算命是以來遲知縣憐其真誠與之實告說道你有這等才學不怕無高飛之日今這文宗因朝內六要索他銀子他把秀才盡賣額數已定了你回去罷等後科來本縣求太尊同送你入道康夢鶴無奈回來空走一場且說提學承命薦拔乜物爭拳拳記在心胸不意那時誤聽了乜物生茫茫不知遂舉乜物生爲首名且喜鄭判軀幸入泮宮矣意福善禍淫之言亦無憑也以其祥之累世積德而困窮若此以判軀之累世積惡而發達若彼時人有拖幛之詩爲證瀟瀟風雨太陽玄隱隱空山迷樹煙陋蒼匝衣終殀命險林暴客多壽年嘗見恃力威矯矯曾無尚德祿綿綿今日莫論天道定禍淫福善總虛然只康夢鶴歸來與線親及平娘告知如此如此平娘聞之亦愁起來說道這銀子是要緊的如今這般貧窮缺乏盤費一個區區芹泮尚采不得況望雲霄之高哉真所謂英雄無容武之地教我怎麽好二人正在愁悶之間忽報鄭判軀來相拜夢鶴出門接入對坐夢鶴拱了一拱道恭喜杜兄懷抱利器今幸榮遊泮水異日折桂廣寒自丘基矣那積壓鄭判軀做了秀才之後驕益矜甚因說道杜兄得了府縣案首爲何不入考康夢鶴道既知道了何必把這話來相謔鄭判軀道弟果實不知雖然兄有此多才多藝人所難能昔遷父司馬談善於星曆書蔔卒爲漢太史世稱賢士何知兄台後日不以材藝見長而爲太史乎瑣瑣文衡是兄所優爲而不屑也夢鶴心內愁悶未消忽然又聽這言語心內之火沸沸莫禁因發出道兄何必如此譏笑小弟不過命運未通豈不聞三年不飛飛即升天乎三年不鳴鳴即驚人乎今年文宗秀才盡賣兄不過僥倖于萬一何足責哉鄭判軀道必秀才盡賣而小弟僥倖乃見才學夢鶴滿身皆火半句話也說不出鄭判軀見此光景知是惱他因說道弟短于言語科但所言皆堂堂正話願兄千頃海涵不勝榮幸即抽身揖別康夢鶴送出門道兄得了一領藍衣真可謂意氣揚揚矣判軀笑而不答攸然而去在路中想道你不要誇嘴等我把你弄一場飽戲來看正是得意讀書本等焉失時不過未亨宣可憐嬌傲傷人語六月猶如臘月天且說鄭判軀既去夢鶴夫妻自相慰勉不出二年歲考又到康夢鶴道歲考將至文宗限這月終決如今又無盤費卻怎奈何平娘道不妨把妾身中所有衣服物件尺剝去當倘得僥倖漫漫取贖未遲夢鶴正要拿衣服出門忽聞鄭判軀敲門叫哥哥在這裏麽夢鶴道他又要來氣死我了平娘道你不聞孔子見陽貨乎任他無心之說我不過以無心之聽就好了何必忌他夢鶴心以爲然即開了門請入坐定夢鶴道兄此來有何見教鄭判軀道兄知文宗又案臨泉州要吊十縣上去考麽夢鶴道曉得判軀又道兄須念功名吃緊不可自誤夢鶴道曉的判軀又問道兄約何日起身我們明日就要走了夢鶴道好兄請先走小弟隨後就來判軀道兄若無盤費小弟有三兩銀子銅錢二百文願借兄未卜兄要否夢鶴心內暗想道那時有這樣好心猜疑未閃冷笑而已因說道兄不要來弄弟判軀道豈有此理銀子現拿在此那裏有假天下事真的便不假假的那裏肯真把一包銀子就交與夢鶴手中夢鶴歡喜出於意外說道其然豈其然乎判軀道朋友有通財之義古人有脫衣解驂車馬輕襲與共又何怪也夢鶴恩不在多寡而在當阨弟今處困阨之際幸兄借助之恩倘得僥倖是兄之賜也弟當入五內斷不敢忘這恩德遂起身相揖而別夢鶴入內與平娘說出此事平娘道妾竊視這個人而皮帶殺心腸奸險那裏有這等開心見佛莫不是天助德有所假乎康夢鶴道有這銀子命書不須帶去你入內收拾行李明早即便起身至次早別了母親與平娘肩負一小小的包袱身穿一領舊舊的白衣足踏一雙新新的草鞋平娘送他出門如愁如癡淚流兩行說道君要去了須要早回夢鶴不覺驚訝道賢卿常時處別離困苦之中皆淡然自適今奈何頃減玉肌斷卻愁腸與往日大不相同此是何故平娘道妾非有別事只因君要起程精神恍惚氣脈洶湧三魂飄飄七魄渺渺不知爲著何來且觀我君眼下黑筋浮現願君這去務要眠早起遲順時自調不要想著妾身只要我君這去鼇頭獨佔早早回來相見一面夢鶴道不須煩惱請了正是淚眼流水急愁逐浮雲飛臨別叮嚀語章章是隱微且說康夢鶴行至半途二面銅錢用盡是夜店主要索宿房錢康夢鶴道你不要慌我有銀子在此等我去換了錢來算還你乃走到銀鋪中換了錢來理還飯錢明白就要起身忽見一個人頭戴一頂尖壇帽歪在半邊身穿一領青布短襖走得氣衝衝亂叫道秀才不要走嚇得康夢鶴魂不附體暗想道我平娘斯料不差了那人道你是斯文君子怎麽好行這小人事我這銀子是銅銀你好好拿錢還我倘若不肯定要扯你到縣嚴究康夢鶴道你銀經你看是好的你才肯算錢把我如今換了許久乃把這零碎銀子來誣賴我那人道無天理這銀子明明是你的怎說我誣賴你兩人相爭不開扯到知縣裏去究問那縣官即出堂問道康夢鶴你乃讀書家怎好用銅銀騙人干犯國法康夢鶴道這銀小不是小童生的小童生的銀子沒有這等碎是他賴小童生且小童生若是銅銀他那裏肯把錢換小童生許久時那人道小的看他是君子家全不疑是銅銀只看銀面而已及他拿錢去了小的疑似不決乃把銀剪開看時裏面儘是銅知縣對那人道你做生理之人必須勤謹若有疑危不當面剪開與他看他就無言怎好這般糊塗做事發打十五板又向康夢鶴道你偷用銅銀律不容赦隱害良民該當何罪發打四十板衙役將下去康夢鶴泣稟道容小童生苦訴冤枉縣官道是你自取其罪有什麽冤枉康夢鶴道瞞不得老爺這銀是小童生一個朋友庠名叫做乜物生的想必是他前日懷恨在心假意把這銀子來借小童生實是要害小童生了伏祈老爺垂憐恩赦那縣主道念你是斯文家爲人質直被人所害無心之過其情可願姑免你一命你務宜把錢還他銅銀自己收去兩人叩謝而出那時夢鶴在半途之中去還兩難沒奈何脫出身上一領禮衣賣錢二百文回家正是鐵石奸心傳不虛害他半路空躊躕聖人失意喪家犬豪傑逃生漏網魚卻說康夢鶴回來在路中行邁靡靡譬如雨滴雞眉鎖眼澀宛若喪家犬一步寬一步緊忽到了門首聽得房內哀痛之聲愈覺憂愁竊自思道必是平娘知我被害在這裏哀哭忙忙趨入見平娘同一兒子病在床裏那時平娘手足虛損不能動履忽聞夢鶴回來勉強起來坐於床中問道君何來之速也夢鶴發即與之云云平娘道妾知他無這好心俺母子亦得與君相見一面夢鶴含淚說道賢卿千萬保重金體若有不測叫我怎麽好平娘道君前日會蔔如今再與妾占元如何夢鶴即盥灑焚香占得地火明卦初爻落空夢鶴拂龜而謝說不好了初爻屬小口應屬妻明夷者傷也然而天數雖定人事亦不可不盡速請醫生調治服事半月之後湯水不入口平娘向夢鶴道妾望與君是年鸞鳳友那知今日化作兩參商我君我君妾誤你了妾誤你了言訖瞑目不語嗚呼哀哉歸與歸與正是自古紅顔多薄命琉璃易破彩雲收魂消腸斷落花盡晴鳥寒依聲不休越有二日兒子相繼而去嗟嗟福無雙至禍不單行夢鶴于斯時也室如懸磬一身恍如巨石之壓要泣無淚要言無語忙忙愕愕束手無策其母陳氏泣道不如把這一間瓦厝典賣俺母子移在這邊一小間茅屋居住乃賣了五百銀子買棺木依衾收斂埋葬明白後夢鶴每於晦明陰雨觸景傷情漸漸痛哀不已正是紅粉佳人並兒傾夫君玉碎若零丁願隨汀瑟聲中死不逐胡笳恒裏生傍觀聞者無不垂淚歎傷時有一曲紅納襖爲證徒向著土唯前列酒厄恨不得是玉容對鏡時縱則向夢兒中能相會痛殺我安得日中見伊想當初十年前無知識到如今此時間免淚垂除非是起死回生一雙雙丁令還靈也現原身使我知那時夢思想之情莫禁援筆做一篇憶情文雲憶我前日執手偕盟若我生你死望崢嶸嗚呼哀哉糟糠已往骨肉才傾撫松以吊影臨流壑而歎聲月翳翳以將入寒氣侵衿誰共明風飄飄而呼拂呱聲在耳忽眠驚哀哀我情淑溫智惠才德幽雅籲嗟妻兮誰知鸞簫叫鳳笙呈嗟殂兮誰知你之堅貞哀哀我情魁梧梭偉聰明情英籲嗟子兮誰無雀躍與鶴鳴籲嗟今兮誰知你之無成楓葉無風自舞或吧幽人之寂寂陰雲不雨自冷或淚我身之煢煢哀哀我情睹衣裳以失色睡衿席而如醒望林泉以悽憤願草木之無菁哀哀我情你二人其亡矣我一人獨存哉蘭風空兮夜鶴怨玉人去兮曉猿驚萬籟俱寂心常動百精鹹寂影自行已矣乎寓形宇內凶難測未知何時能回生康夢鶴吟完之後不勝興嗟流淚但未知後來如何且看下回分解
