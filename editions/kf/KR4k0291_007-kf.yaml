body:
  text: 第七回因遊學喜逢詩友詩曰風從虎兮雲從龍魚趨深水鳥趨峰絕無琴瑟聲相左那有芝蘭氣不濃外處奸人休遇合遠方知己喜相逢聞音默契絲桐操豈在區區對酒鍾卻說康夢鶴妻子俱亡之後說不盡淒涼悲苦忽一日在家抑鬱無聊對其母陳氏說道兒要出外遊學聞廣東有雇考兒可乘此機會遊學倘有人雇兒入考便得些銀子回來但思母親在堂有犯遠遊之訓將奈何陳氏道男兒志在四方何必鬱鬱局守林壑間也你若有上殖蹊徑放心奮翼安知不無天作奇逢使吾兒失之東隅收之桑榆乎你弟今年長大生理亦略無憂我母子可以淡薄自安即你在家亦幹有何事業任你去遊罷夢鶴即日拜別母親囑咐胞弟促裝起程一種受盡風霜雨露忍饑耐渴先到了潮州府觀其城郭之壯麗山川之名秀人物之清俊然民風土俗略不相同士女老幼渺不相識康夢鶴道我在這泛泛若水中之鷗卻怎了今夜不免投在庵院借宿一宵再作區處正在沈吟間有一個老和尚出見說道客官從那裏來康夢鶴道小生家居漳州聞上刹清爽幽雅一求瞻仰佛像二來拜謁長老三來遊學雇考今要來假一房暫宿幾日得以溫習經史苟遇良緣知己得以雇考房金一一奉納和尚道尊官來不及時了前日因一個光棍冒托秀才遊學宿在這庵中後來拐帶人家女子惹起一場大禍如今太老爺出告示嚴禁寺院庵觀不許窩宿匪類有塑望寫結尊官要宿這庵中萬萬不敢收留夢鶴看這和尚好無理惱起來把筆提一紙張以言之芯萏猶識向陽生堪笑藜肉眼睛舉頭瑤林任我宿吾儒孰苦無賢迎夢鶴題詩之時那積壓有一人在身邊熟視了半晌不覺高聲贊道好文才夢鶴轉身視之乃一個庠士也那庠生拱了一拱就問道敢問社台世居何郡高姓大名因甚至此夢鶴即取前日有占一本命卦爲姓名乃應道小弟姓蔡名允生家居霞漳因遊學至此要假庵暫宿幾天候有機會得人雇考誰知和尚不肯容納敢問社兄貴姓大名那書生道小弟姓陳號天英又說道兄何患無處宿小弟有茅齋離此不遠雖鄙陋荒蕪卻無囂塵繁冗未知有當尊意否蔡允升道得蒙垂愛三生有幸但弟碌碌庸軀恐不敢攪擾陳天英道萍水相逢孰非我輩然小弟家居清貧僅是蔬食菜羹而已倘有怠慢失禮希祈見諒蔡允升道這等多謝了兩人即攜手同行到家吃了晚飯宿了一夜次早有一位朋友乃丁卯科舉人叫做許文泰同一位查必明來問漳州有朋友稱要雇考在這裏麽陳天英出見說道在這裏社台問他何事許文泰道我這位朋友要雇他做卷陳天英即引入見允升說道這位就是霞漳社台姓蔡名升許文泰拱道失候了允升道不敢允升複問道這位社兄高姓大號天英即將兩位通了姓名蔡允升拱道失敬了許文泰道不敢正談論間而早膳已至陳天英道無肴之酌可談心乎許文泰道極妙極妙四人遂對席同飲議論雇考之事允升又觀檻外蘭花下有一塊石生得甚美極奇允升道此石胡爲乎來也陳天英道弟前日遊山水而得也其色如珷玞光澤這數日內要詠賞一會但思索未就幸兄屈駕賁臨希祈椽筆見教蔡允升道不敢書雲遊於聖人之門者難爲言陳天英道對客揮毫最是文人雅懷小弟得親見瑤章興複不淺允升複讓許文泰許文泰道兄休太謙允升見推辭不得且詩思勃勃正要賣弄才華因說道既蒙列位雅愛敢以獻拙諸兄休笑無鹽之醜乃任意揮灑不消半刻成了一篇席中數位都挨擾來看只見上寫道檻前卓爾一崢嶸說是元章神出瓔圭譬文華稱國器璜琮秀美羨朝英豈真織女機中墜恍似淙紗津上生談理點頭千古在虎丘寺內傳頑瑩只因這一首詩使人愛敬大家稱羨歡飲那查必明見人人讚美彼竊自思以爲用這人代替不患不進泮雖然外才雖美未知內學何如即開口道俺大家吃了酒後拈一題頭來做文章正見以文會友之意天英笑道我知你非要會文乃欲試蔡兄內學耳又對允升道瞞不得蔡兄我這風俗同有朋友來雇考必須親試一篇果然是好然後敢用他不然恐有一二冒假之徒借雇考爲行不但虛耗日食誘騙銀兩而且誤人功名不淺兄之大才不待試而後知但查兄要作兄不妨就做一篇指示大家休怪冒瀆幸幸查必明道弟極不才安敢當試一字不過大家潤思集益而已允升道傳前論文斯文樂事若不親試何必見得真假請出一題許文泰道就出君子以文會友一節允升即提起筆來隨心應手遊刃有餘不須臾滿紙珠璣立成持與天英諸友看天英稱讚不已文泰道如今當寫契立數了必明郎立了契內寫如進泮謝銀一百兩否則只送路費五兩立雲英等爲中人立議明白大家揖別分散打探文宗按臨消息奈提學未到姑置勿題且說蔡允升在書館中誦習經書有感石洞泉水之聲援筆題一首詩雲獨坐幽雲洞泉流似我清靜聽危石響宛對素琴鳴潤曲聲輕轉峰斜影倒橫心閑似入定塵事不關情是日陳天英遣小斯送喜逢益友十二回文至蔡允升拆開一看芳名喜得善交濃久敬容允升隨時即和交與小斯持去天英接來一看芳名傳友得心濃喜敬容陳天英暗想道我做一首詩必推敲半日在他不用半刻真捷才也過了數日適逢三秋佳節楓懸錦旆菊設金錢允升值這良辰美景正在思想說道昔張翰思蓴屈平飧菊此其時也我賢妻你若在日依韻和倡許多快暢而今不可複睹矣正在愁懷之際忽見許文泰陳天英諸友齊至說道兄在這裏寂寞無聊俺大家要扳兄登高遊玩未知兄肯去麽蔡允升道小弟抑鬱局處才發此興幸蒙寵召敢不從命衆人邀了允升一齊出門俱到名山秀水登虎豹之上踞虯龍之下左顧右盼其樂無窮既而村沽野黍山蕨溪魚具列於前數位即次坐劇飲酒至半酣乘興限韻做詩各自對景吟哦允升先完具稿與衆席看詩雲九日攜襄天際遊嵯峨片石自悠悠江搖千盡層層浪楓落孤村色色秋萬里乾坤歲月共一肩琴劍煙霞儔休教踏遍蒼苔路且向傳觴曲水流二人看畢口裏稱讚不俗心中思索詩詞說道待我們做完一齊來看須臾許文泰亦完兄見寫上相傳此日皆萸遊載酒登臨興自悠片石有情留客醉黃花開遍耐殘秋白衣不讓陶潛趣落帽甯誇王子儔作客每歡逢勝會眼前山水有風流陳天英道弟亦做完希祈教正數人皆披在席上看披昔登山縱意遊曠觀寰宇心悠悠水天一色清泉趣霞鶩齊飛滿樹秋曳屐遐思高士迹攝衣追慕騷人儔攜來菊酒對君飲始覺茱萸古今流三人看了各相稱譽不題卻說席中有一個姓姚名安海系許文泰密友其爲人口舌利便好險嗜利性慕風月善於逢迎雖並詩友之益但笑談遊樂不可無其人滿筵在席高吟和興惟姚安海寂寂無趣說道蔡兄有此丰姿才學真不愧相如君瑞之風諒令尊嫂必是佳人可知蔡允升道小弟之內拙雖不敢以佳人自負要亦非庸婦之可比不幸於舊年花謝小築幽明永隔千兮一年夫撫景傷情眼淚將下衆友慰道自古紅顔多薄命眷戀之情誰忍不傷雖然修短有命惟祈高明以理節哀姚安海道兄何患焉弟那邊離書齋不遠有一個女子姓卞名玉真生得豔冶秀麗性格溫和女工之外更通詩賦他當天發誓有才有貌的才子才晉配他如今已二十歲了尚未婚對兄有這才貌來去小弟書齋中不時吟詩挑動他借弟爲斧柯焉知天緣不湊合乎若然則弦斷再續而佳音猶在妻亡再娶而佳人猶存未知兄意何如允升道極承雅愛但念亡妻死未三年忍再娶姚安海道社兄年方壯盛豈有不弦之理蔡允升道不然小弟非獨情有所不忍且處發今末世聘儀不備難以議親小弟不過一介寒儒那裏有聘儀姚安海道他父親是老儒庠名世傑年已五十多歲他母親林氏爲人極賢淑年已四十餘並未有男子倘回思轉念要贅一佳婿以娛晚景不消聘銀亦未可知許文泰道姻緣乃百年前系定非人所能料但安海兄一個書館清淨幽雅有花木水石不時可玩賞比天英兄之茅齋枯淡不同蔡兄不妨去歇他且查兄家居與他相近日食奉侍又便一些兒諸朋友一面談話一面吃酒到了天晚各各分散歸家至次日蔡允升移居姚安海書齋中看見席上一柄金扇展開一看乃前日被人所試賀壽詩後寫敬賀許老社台其筆迹與詩字略相徑庭夢鶴不覺歎奇問安海道這柄扇那裏會到此地姚安海道這筆迹之人與兄相識否允升道題這扇之人與小弟相愛如共一身若持這扇來送兄之人與小弟渺不相涉不知是何人姚安海道鈞是一個人那裏有題詩是一個人送扇又是一個人即因前年兄貴漳有一個朋友姓康名夢鶴亦如兄來遊學雇考幸逢許舉人壽旦諸人賀詩各要句句藏詩酒蓋因文泰樂於詩酒而取義也那康夢鶴亦題一首去賀他諸友無不稱讚爲上乘乃請他入考允升道爲何不試他內學姚安海道許文泰本要試他但因端午節與他到園中觀菊文泰說處今之時尋芳者孰識菊花之堅貞康夢鶴忽歎一聲遂吟詩一首文泰觀其詩才敏捷句句精工甚然歎服不久宗師要考是以不試他蔡允升道這詩不知兄曾記得否姚安道記得首二句請誦與兄聽四顧衆芳開滿庭悚金石才葉青其餘六句則小弟忘之矣允升道後六句弟會誦得兄會認得麽姚安海道誦得真那裏認不得允升即育了一遍安海道莫不是兄在書齋中看見乎允升道後來這人入考如何姚安海道彼時這才子許舉人極稱他有隱德出場後即要他寫出文章看他一定不肯寫及至出傍墜落孫山開誠佈公送他五兩銀子歸家允升道夢鶴前年未曾來那時有夢鶴這等多耶閒話莫題且說安海要謀玉真婚姻未知何知且看下回分解
