body:
  text: 第十四回出意外被姦拆離詩曰説起讒邪舞劍時姦人之惡甚於羆淚添流水江潮漲愁鎖秋山楚峽微伐木友朋服不解關睢夫婦苦相離相思只恐未相會會猶不會最可悲卻説蔔世傑回來舊宅也不待擇日即打掃一間房整起一張床點起蠟燭排起果品等候康夢鶴來成合婚之禮那知姚安海前日撞見了康夢鶴要報此仇即遣人去請高仁來姚安海道弟聞玉真承兄之惠至今尚感不盡奈康夢鶴果然未死是以玉真眷戀於他而不暇及社兄必如何將夢鶴害死斷了玉真念頭他必實心待兄高仁道康夢鶴在那裏姚安海道前日被光棍騙去銀兩今寄棲在叢林庵中高仁道你敢操刀去殺他不成姚安海道不容刀殺現今太爺是兄義父可去你義父處告他説是光棍騙你銀子扯我為幹證用些銀子囑託該班把康夢鶴當堂活活打死叫誰來討命高仁道蔔世傑還收我之聘銀不如都告了他姚安海道不可做一起告且待害了康夢鶴再來區處那時怕他不還我娶今康夢鶴未死老哥亦再娶他不得高仁即依計而行那太爺遂差兩個班頭速拿棍徒康夢鶴究問是日康夢鶴正整起衣冠喜悅自得望世傑之家而來到了門首世傑看見出來迎接不料後面鐵鎖早已系在康夢鶴頸裏康夢鶴吃了一驚説道你是何人敢來侮弄斯文君子怕有法度麼那該班道我乃太爺公差現有朱簽在此要鎖拿你這光棍去活活打死苦得康夢鶴就如死的一般正是半晌迷津幸得知忽然非禍復相催英豪失意魂銷矣喜處逢怨珠淚垂卻説康夢鶴被鎖到太爺衙門候審斯時高仁姚安海俱在場夢鶴暗想道這個都是姚安海弄起鬼來害我然不曉得他弄的是什麼鬼等審了便知時長班入內稟報原被證齊了太爺即開了衙門坐在堂上叫康夢鶴問道你是何方人氏敢來在此騙高仁的銀子康夢鶴道小生是漳州人氏遊學到此未曾見他的面那裏胡騙他的銀太爺又問高仁高仁道他當日假做賣珠客商身負一皮箱鎖得堅固趕不到路站借宿小生家裏將一皮箱説是真珠琥珀交小生收至次早借小生銀一百兩把這皮箱與小生做當約次日就來取贖誰知他一去八九天不見回來小生打開皮箱一看儘是零碎石頭時有姚安海見證乃吊姚安海問道康夢鶴騙高仁的銀子你果親見至姚安海道時小的才到他家親見有銀交他康夢鶴道實無此情這姚安海前日曾偷小生的銀子被縣官靚了二十板經審在案於今懷恨在心唆謀高仁來誣陷小生願老爺垂憐明察那太爺雖受高仁囑託但看康夢鶴儀容俊偉出言吐氣概有才子之風勒寫供狀康夢鶴供畢呈上太爺太爺取來一看只見上寫道供狀人漳州康夢鶴為誣陷莫白懇求昭察事竊惟萋菲姦讒善創平地生波之詞雀角穿屋能生無風起浪之悲唾面自幹原素志眥目捏誣心難知明系機關要害我全無相爭賺頭資實是牛馬不相及孰肯甘為直不疑漫漫暗想斷非謀財致官司悠悠忖度必是因色致危切思不受于乘國誰信肯食嗟來粢只因前有安海結仇無端今和高仁侵欺敬能審得無偏無黨便各吾儒非棍非私伏望大人明鏡斧斷垂念小子流落孤離生當仰天祈禱死願結草報禧不在多言伏乞台鑒太爺看得布詞有典故押句步詩韻心知是真才子非光棍之比不忍打他然受高仁之銀又不好放他想了一會因説道這樁事屬莫須有本府饒你一命不加你罪著你還本籍差一衙役押解禁他不許復來好去在家安以讀書彼時許文泰陳天英查必明等都在那裏看審各懷手本倘若丟發要打時衆人俱要公呈保結及審完無事逐出數人皆向前慰憫含淚而別自是康夢鶴亦無見蔔玉真一面即時解歸本省去了正是紅州衫袙千秋濕易水衣冠萬古悲莫道英雄不下淚英雄有淚只偷垂那玉真聞知夢鶴之事心下越生懊惱眉央愈見皺聚對世傑説道爹爹你知高仁這一個好賊不日定來強娶孩兒若不從他俺一家定然遭他毒手了如今卻怎麼處世傑道吾兒有何計策玉真道少不得與他見官乃能開交正説間不期張媽果然來説道高老爹擇了吉課要來親迎著我先來通知未知卜秀才肯許他否世傑道吾兒已許康夢鶴那裏又許高仁無端説要親迎是何道理真是任爾冰霜至難凋松柏堅當今升平世界未聞有財勢敢占人家女子我求你去勸高老爹説他不必胡思亂想縱有千姦百巧也是徒然張媽見其意堅將此話歸告高仁高仁即問姚安海道蔔世傑這等無理銀既收去女子不許我娶兄有何法處他姚安海道必太爺處告他多用些銀求太爺當堂親判那時怕他不與我娶高仁依言即具狀在太爺裏去告告狀人高仁為阻娶滅聘事切仁用金一百兩借張婆為媒姚安海為證於某月某日納采蔔世傑之女名玉真為妻證料世傑狼貪虎行聘銀既收娶女不許無地無天苦乞太老爺嚴拘究治判斷撮合以遂二家之緣陰騭齊天沾恩切告太爺閲畢即差役立拘卜世傑蔔玉真並原告幹證一齊聽審人犯齊到太爺問世傑道你既收高仁聘銀又不許他娶女目下全無三尺了蔔世傑道一女只嫁一壻小女已許配漳州康夢鶴那裏有收高仁聘銀之事太爺道你女兒既許康夢鶴經有定聘曾過門否蔔世傑道未有定聘亦未曾過門但女兒發誓堅操不易願嫁與康夢鶴太爺疑其有私問玉真道他是外面之人你婦人不出閨門他與你有何熟識玉真遂説其回生之由相見之日其答辨言語便便然如撞巨鍾侃侃若決江河太爺笑了一笑説道這都是鬼話乃對世傑道你敢説並未收高仁聘金媒婆親交幹證確據你是生員禮義之門豈不識此理你不過寄放張婆家中本府一盡都知道了如今著張婆送還你好好將女兒嫁他罷又勸玉真道本府判你配他亦不負你他本身是監生家資數萬嫁他許多受用且你前日歇在他家亦經受他送轎之惠你下轎時又説要報他有之乎玉真泣道妾雖有此説不過多以幣帛相報那裏以身報他是何道理妾有供狀伏乞龍眼親鑒以表妾心呈上太爺看只見上寫道供狀人蔔氏為恃強賴婚以敗名節事伏念氏處閨中謹訓內則前世結誼已系絲於夢鶴今生締交又受命于父母一言既許千金不移妾寧為雞口莫為牛後願與鸞鳳同棲羞與雞鶩比翼豚犬非龍駒之比鳳雛異黃口之儔建安才子孰嫌家貧遼東白豕何貴濁富經緯甘同死魚蟲醯雞愧同生涇渭判然薰蕕迥別忠臣不事二主烈女不嫁二夫蕭曹無逆娶之律明官無改婚之理關山雖遠而望夫之石尚存舟樓雖離而成灰之心可會補兗有望於夢鶴黔驢無怪乎高仁願秦鏡照臨祈孟劍剖析則妾三生之幸也謹具口詞伏惟尊鑒那時太爺由進士出身博學好文素重風情觀玉真之姿色讀供狀之典雅知其有佳人好逑才子之志自思道他雖富貴彼視之如浮雲安肯以皎皎之身而受汶汶之汙乎若判他嫁高仁是迫之死也若不判配他又受高仁之銀不好意思想了一會暗暗自説道吾前日觀康夢鶴是個真才子有此才學諒他不久定中待他中了來娶隸遲不免做了一個人情機關罷即提筆立判雲查得玉真溫惠堪敬節烈可見推其心揣其意願隨知音死不向回塵生日月可移而紅定之選不可移山河可改而絲夢之結不可改蓋知因賢慕才而非狎昵之私卻富忘貧而非矯強之志交鴛頸至此不能以挑其琴孔雀屏至此不足以約其箭情牽意絆志切心堅洵有海枯石爛之盟信有天高地厚之誓愁夢鶴阻遠未知何日來親沮高仁比鄰嘗不自量欲奪度以中正之道處以兩全之機著玉真為父母之家守身不字以待令高仁收未聘之禮選娶別女以成判語已畢遵照施行判畢乃對玉真道這一張文案本府用印在此交與你為執照不許你嫁他人又吊高仁道你取銀回家別娶本府不許他嫁準他全節奉侍父母一世就罷於是命蔔世傑將玉真領回去又對玉真與高仁假做人情説道你若是要嫁準你嫁高仁如康夢鶴與別人都許玉真誓道三軍之帥可奪匹夫之志不可奪是可刖而抱璞之心不可屈身可死而連理之枝不可離太爺愛其玉立敬其金石説道本府曉得總不許你嫁及高仁出來姚安海對他道好了康夢鶴不許他來娶玉真不準他去嫁我好用多多銀子與他父親慢慢引誘他不然再創一非禍加他將他秀才黜退料他孱懦之儒何怕有不成之理未知後來如何且聽下回分解
