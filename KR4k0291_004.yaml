body:
  text: 第四回注生廟誓約花燭詩曰高歌一曲向花前遙憶當年酒席邊碧沼鴛鴦交頸固妝台鸞鳳同心堅百磨不悔方成節一見相親始是緣漫道婚姻月老定人情膠漆可回天卻説康夢鶴回來見母親説蔡斌彥非實情來請卻是要退親即將自己與蔡斌彥應答的話細細説與母親陳氏知道陳氏説吾兒有志要他銀作什麼母子憤恨不已且按下不題卻説許氏叫丫鬟去請夢鶴道我家奶奶要請康相公敘話片時康夢鶴道你為我多多拜上家主説我不肖被嫌有愧窗下磨勵之志無顔去見且相見不親不如不相見要問閨闈花燭豔必須金蓮徹夜時隨他去退親我再不反悔他丫鬟把這話一一回覆平娘道他那裏朦朧怨咨我這裏心如棘刺如今思量將奈何有意訴衷情急奈他志氣昂昂反做一個無情郎時人有歌離亭怨一曲從今後玉容消磨桂花朵秋風吹羅這相思何時諧和記得當初天後為斧柯到了如今父母作風波望夫石渺渺太行山峨峨白茫茫陸地來厚碧騰騰青天般高仰望東落海毒害的恁麼過了數日梅瓣白飛柳眉青青正孟春和煦之時漳俗男女不論官家貴族出外遊春踏青真真可觀但見紫白紅黃色色豔粉青黛緑溶溶嬌有個雅淡梳妝海棠聞遍有個薄施脂粉柳絮飄殘澄澄蒼苔蓮深淺藹藹清馨蘭麝飄采梅的帶香摘花的微笑水月耀碧花柳爭妍宿鳥驚騰巍巍花梢扳弄紛紛惹恨的春光撩亂的豔冶端的是如荼胡然而天真個是東門如雲胡然而地那日平娘坐一兜轎帶一丫鬟乘這明媚之景駕言遊春實是要往注生娘娘廟沖願早來到登了門階入到廟堂參了菩薩左顧右盼忽見壁上有題一首詩仰讀雲虔心默褥對神明汗染欄杆恨注生玉箸金甌鼇起舞瓊林瑤樹鳥飛鳴三峰筆寫愁途遠九曲觀磨淚水盈願得牡丹交禦草五雲加色謝升平本郡弟子康夢鶴題平娘知是其祥咨嗟自憤之筆讀了又讀不覺歎道清新俊逸然詩之中有願求佳人之意我不知是怎麼模樣是怎麼才德是怎麼風流才做得一個佳人妾雖色惡詞蕪不妨和韻一首即提起筆來如龍蛇飛舞風雨驟至不一時就定正是豔女恍如七步人溫柔體態珠璣新始知天地山川秀編在娥眉文略神平娘題完又覘見桌上一枝扇著女婢持來展開一看內寫唐詩一首後題為其祥老杜台正字平娘知這扇是夢鶴的少頃必來尋覓我不免到後殿參數羅漢等他一等原來康夢鶴與蔡平娘雖是表兄妹從未曾見他形容才學那時廟中題詩見了一乘女轎來他便抽身往後門去將扇丟在桌上忘了持去少頃果然來廟中覓扇仰見壁上不知那一個和他詩遂無心覓扇留情看詩然未讀之先見其筆精墨良耀耀動人心中已有勃勃景仰不盡之意及讀雲仰上高山月色明何時殊引慰三生人遙室邇冷猿淚情隔河長秋雁鳴雲鬟懶梳葉落滿曉妝羞對苔生盈神如有應驪珠合免得深閨抱不平本社信女敬和康夢鶴讀完不覺驚訝説道天下有此大才的女子近在眼前夢鶴何褒然棄耳而未之聞也然無題名氏又不知是何人想了又想説道這詩中似素相識未嫁的女子存仰慕見愛之意曉得了必是來的一乘轎之女諒在後殿未出不免相見他一面看他如何乃躲在錦屏後偷看只見得眉彎新月眸凝秋水臉襯二片朝霞唇帶一點紅日錦裙下覆一雙小金蓮輕移香階有蕊珠宮嬌嬌之態羅袖邊露一對纖纖玉筍軟玉舒展若水月殿溶溶之姿秋波一轉惹得魂靈飛天美蓉半掩動得眼睛亂撩嬌的是儀容嫋娜媚的是體態旖旎形不盡輕身秀體説不盡錦腸繡心翩翩清爽輝輝金石若非嫦娥降臨疑是洛神再世康夢鶴道我要四海求佳人誰知佳人即在門前卻不曉得是那個女子不妨近前問他若是應我也罷若是不應我我隨他轎後看他何方去便知即向後堂蹁入那丫鬟認得康夢鶴是時立在邊傍見康夢鶴進來即厲聲叫道康相公你要尋扇哩扇在我小姐手中那平娘先時見一漢子突然進來正要轉身躲避開去聽見女婢説是康夢鶴便住了腳把夢鶴的扇掩在面上啓一點朱唇説道原來就是哥哥我母親前日請哥哥敘話不曉得哥哥怎麼如此堅執今觀題詩之意乃知哥哥是要求天下佳偶是以執一不去未知這幾時佳人有得否康夢鶴風流任興春風滿面答道賢妹你有所不知賤兄與賢妹乃憑天後娘娘為媒簽詩為記五百年前紅絲系足焉肯效扊扅之炊白頭之吟為百世後譏薄情漢乎無奈你爹爹忘卻瓜葛之好絶發葭莩之親貪富貴厭貧賤你兄恨不能蚤占鼇頭客而反作銀樣蠟槍人是以有愧癩出見面若論賢妹一人賤兄不能寤寐忘情矣未知和的詩即是賢妹麼平娘道俚言腐穢有辱邯鄲學步哥哥休笑裏婦之顰夢鶴道句句秀雅字字佳章真珠玉也平娘道休説這詩間話且説我爹爹不日要接俺母子隨任斯時路途遠恐銀河阻隔漢槎難渡今我爹爹被我母親力勸亦銷有冰消霧散願哥哥乘勢應時庶免事事有變之歎雖奴家柏舟自誓然現今不作同心結而要後日作連理枝悔之無及康夢鶴道你賤兄現在陳蔡之際涸轍之中倘要成就了大事鶉衣何以為禮醑蕨何以為情且賢妹入門時清波可飽乎緑草可茹乎平娘道哥哥不須憂慮平娘乃取身邊所帶象牙環一枚又以所佩碧玉貓兒墜一個並銀簪金鈿盡拔下來付女婢交與夢鶴説道哥哥可將此物去變賣休誤了誓約夢鶴喜出望外對平娘道感情良不少報德何時了夫以夢鶴百年屬望慰在一朝二人眷戀不忍分拆看看紅日漸漸西附沒奈何含淚而別正是本思四海求嬋娟誰料芝蘭在眼前有意求珠珠不吐無心歸璧璧完全康夢鶴回來不勝歡喜見了母親説注生廟遇見媳婦如此如此陳氏欣然道我媳婦有此賢淑堅貞是我家門之幸也亦正是吾兒之敵配也夢鶴即將這些物件賣數十兩銀費用殆盡所剩無幾不幸遇著鄭錦那幾年破家之後聞夢鶴要娶親登門迫討媒銀無奈將所剩的銀子送他去了要用又無分文不覺歎道人情似紙張張薄世事如棋局局新先父在日有酒肉交歡個個知心今至我身人情亦做不成如今還他罷了間事不要管他斯時即擇了一吉辰雇了一乘轎子衣冠齊整門庭光彩雖無燦爛盈門之華美亦有風光清雅之儀容且説平娘回家許氏見平娘簪細等物皆空問道你出去踏青一身首飾物件那裏去了平娘即與母親告其情由許氏道我兒你好大主宰倘你父若知道就活活打死你他如今這等設處亦妙未知他要何日來娶正在説話間只見媒婆持一紅貼説康相公擇此月十三日要娶小姐過門那知蔡斌彥先往廣東去上任次日在路中差數十個家丁來搬請平娘母子轎馬擁簇亦約在十三日起程母子二人正在分別之際相向痛哭平娘泣道兒從父命恐虧了生平大節要順夫命又吧舍了骨肉分離教兒怨得好苦許氏道五倫之內造端夫婦男婚女嫁古今同例安可以一時之別而誤終身大事乎平娘只是低頭掩淚一句亦説不出許氏催他上轎平娘嗚嗚咽咽又哭起來許氏亦泫然淚下無奈何只得吞聲而別許氏往廣東隨夫平娘往康家成親正是意合情偏切情深意不移萬般依古事死別與生離話説許氏到了廣東見蔡斌彥蔡斌彥忙問道吾兒怎麼未到許氏道男長當婚女長當嫁平娘與夢鶴娶去了斌彥忿然怒道你好擅專我明日即差人去扛他回來許氏朝夕勸他未知何如話分兩頭且説夢鶴娶得平娘到家兩人如魚得水如鳥得林一般是夜夢鶴詠桃夭之章平娘答綢繆之什情濃意合一個得了意外之喜忘貧窮于何有一個得了終身之托忘骨肉之分離正是洞房今夜降真仙暖玉溫鄉滿被春漫言別離情最苦且誇歡會思更新意中有意無他意親上加親愈見親欲得此情常不斷蚤尋月下檢書人到夜來並枕同衾貼臍交股難以曲盡其合歡之情惟有一篇天下樂為記春見生繡帳溶溶露滴牡丹開擅口溫香腮淡淡雲生芳草濕碧泣含皓月滿地泛浮鷗我將這紐扣兒松你將這屨帶兒解陽春和暖渾身泰軟玉溫香抱滿懷柳腰款擺半推半就花心軛折又驚又愛背後著腮潤不知春光何處來胸前著肉磨不聞花落幾多少杏臉觀月色桃唇映日開鸞被若金叉首飾挺雲鬢曲盡人間之樂不啻天上之降兩人至雲消雨散之後直睡到天明攜手而起康夢鶴口念一絶雲花搖月影露淋淋過盡春光緑色陰平娘即續雲昨夜庭前關不住今朝遇雨吐新心嗣後夫妻心神相契或我倡彼和或我和彼倡恍若關睢之和鳴鳳凰之相應一日平娘向夢鶴道俺須想一活路庶君夜間好磨勵經史日聞好求些利息不可朝朝暮暮戀高唐蹉跎人間日月忙夢鶴道有什麼活路我想不來平娘道不消愁妾善繡鳳織鸞你去街市中問有人有雇女工等事你可承領他工價任他奉送妾又思士君子埋頭潛修安肯露面求利妾有一策君可去賃鋪一間吊起一張篾簾寫著一大坊表與世遊藝君得坐這鋪內有人來求吉課問蔔書畫會須得了世間利息如無人來求時亦可靜心息氣而悟聖賢有何不可夢鶴道靜坐鋪鋪內不殊置身書齋中這計策做的未知後來開鋪如何且聽下回分解
