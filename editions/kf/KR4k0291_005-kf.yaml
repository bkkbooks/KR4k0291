body:
  text: 第五回爲衣食星蔔設教詩曰漫道文章不察饑揮毫亦有賣錢時章台街上九流士金屋家中三教師儒者生涯無壟斷書生貨殖有毛錐堪憐閨豔畫籌策不敵奸人計謀欺卻說康夢鶴既善其言依而爲之每日坐在館中看書蕭然寂寞人家看見一個新牌坊都個個說揀擇口課不是要處我須求那經用的老人家才停當這個後生家不必問他若是問蔔書畫這個無關性命求他不妨又有人在傍說這個人書役且不會做教書又做不得如今複在那裏星蔔俗雲一事成百事精一藝顛百藝敗我曉得這個人不農不秀都是顛狂又有一二半通識之流在那邊議論說這個人學問稍通不過命運未亨爲衣食所累故也你若不信我有一把白扇到那裏求他一首詩試他才能如何又有一人說道古詩我亦會念教育他不過抄寫就是何以見其學問又有一人道我們各限一個韻出一個題目與他做便曉得了三人遂齊到日課館中惹得夢鶴心中想到我今日有利息了誰知都是要來試他那人陪一面笑臉對夢鶴道我們要求一求不曉得先生肯否夢鶴道領教那人道外人都說先生狂顛不曉得先生是真狂假狂要求一首五言佳章大家發起笑來說道你這個人更顛狂怎麽好把這話對先生說那人道我心實抱不平之憤要把這個話爲題目類字爲韻先生休怪了夢鶴道合當領教小子忘卻壯士志無怪乎流俗之譏也但詩之事弟極蓬蒿鉛槧望諸兄休笑遂舉起筆來不須思索臾立成大家求讀一明白夢鶴即讀雲潦倒塵埃中於今有數年花憂風雨夜竹耐水霜天我笑世愚昧世譏我妄顛奮飛期後日誰識此幽玄又一個人持出一幅紙箋要七言律詩一首以菊生於六月間爲題青字爲韻斯時菊未盛花未開實要難他夢鶴又提起筆來即題雲四顧衆芳開滿庭懶看金不才葉青甘心籬舍聊沈醇翹足風霜來喚醒堪笑趨時何種種可憐知己獨零零天生窮達無非運願寄陶潛共一聽中又有一個人看他文字飛舞如神忙忙走去街中買一把金扇來說道小弟斗膽求一首賀壽詩中要句句藏詩酒二字夢鶴又題雲蚤期脫穎聊沈醉對席無文俗了人寓目高懷五鬥解停杯覆翮三都新露澠增賞調商羽珠玉揮成醉壽春椒柏長吟賀反飲喜題時旨祝芳辰康夢鶴題完並讀大家聽大家不曉的是如何美如何不美但觀其舉筆如雷驅雨揮毫如風掃地滿紙如龍蛇飛舞個個歎服那個道我明年覓一書館尋幾個生徒來請先生教書這生業又穩些兒免被俗人譏謗未知有當先生尊意否康夢鶴道小弟命途多蹇讀書滿腹不合時宜區區株守館中管窺天卜無計安枕倘蒙垂顧銘刻不忘遂拱了一拱大家別去是晚夢鶴歸家對平娘歎道道士憎茲多口流欲之輩皆說我顛狂正是要利途反生謗門才有一二抱不平之心要試我文墨考我題詩我即時問他題目遂題云云那人稱譽說明年要尋一館請我去設帳未知虛實何如平娘道君何患謗必謗而後見君天下大才之人不遇盤根錯劃無以見利器不經千回百轉無以見人情必有人謗我乃有人成我來年之學妾蔔是實的不是虛的正是與世無爭守藩籬因何蜂蝶亂侵欺一身成敗隨人轉豔女胸中蚤度知過了來春果不出平娘所料忽見一人手持一個關書和幾個小子遙指門首施施然而來那人道先生認得我麽小弟前日有約不敢失信敬奉關書一紙內題束金十兩膳米四石萬望叱存並和生徒在這裏要請先生即日開館康夢鶴道今日雖是吉辰何其速也小弟書箱行李收拾未便雖擇別日可也即約遲了五日衆弟子方才別去至五日後正要起程適逢平娘腹痛夢鶴號驚疑是搬出衣箱動了胎神卻教我怎好夢鶴即淨口整衣指龜而筮占得澤風大過三爻動系已未日夢鶴道不好了是要生男子了平娘道生男子怎麽又說不好夢鶴道易有之曰揀撓凶正應長男撓折之兆也平娘道盡信書不知無書休信乎卦言未了而腹愈痛須臾果生男子夢鶴道好好今朝有酒今朝醉明日愁來明日當遂後亦歡喜不題且說夢鶴幸得平娘生産明白即到鄉村開帳設教將近半年虧了平娘在家守有夫之節愁悶起來閑看古書見一篇古詩韻不覺勃勃援筆題一首閨思回文蕭聲幾度暗傷情岫出飛雲曉日晴寥靜深閨窗弄月妒嬌花園竹敲箏橋高泛水流聲急夜寂寒蟬噪語輕遙寄錦書傳去雁銷魂拂柳渭啼鶯平娘寫畢粘在壁上又要思起閨怨限韻一題正要下筆之時忽聽得革履之聲回頭視之乃夫君夢鶴也手持一柄破雨傘足穿一雙草鞋顔色憔悴形容枯槁坐在椅上長籲短歎平娘吃一驚不知是什麽緣故原來這館中弟子多是洪袖中的表兄弟袖中要報前日之恨屢屢在他表叔面上說這先生先日經做書算因不識字被官責逐又在街上星卜胡講亂說被人棄嫌平生並無一長想必是長於教讀大家乃請他乎那學父說道或能或不能我輩不識字那裏曉得他袖中複知夢鶴家貧要討束修又想道這人口嘴不好要睥眥罵人因假意入館寫一張字暗暗囑托一個年長的弟子教他如此如此那弟子不肯忽一日合當有事那弟子讀書差錯被夢鶴責了數板那弟子惱將起來不知己之不是竟聽袖中囑託把一張字持與父親看他父親不識字怎曉得緣故因問道這字誰寫的那弟子道是先生寫的說束修若不盡還一個要打二十板嘴裏又勞勞叨叨在那裏罵那學父持出與識字之人讀儘是衙門的口吻讀雲讀書好事拖爾束禮惡俗可鄙屢計數次並無分厘深可痛恨今寫數位聞知立等送還不許挨延日子倘再挨延你等學生各責二十板仍呈官究治決不輕發積壓宜遍告凜尊毋違速速那讀的人說道這口氣真是他寫的他前日經走了衙門來這等真個胡說衆學父聞知發怒起來遂不理不管他大家商量道這先生亦不是教書不如辭他去罷大家即到館中對夢鶴說道今七八月農忙之際小子個個要樵牧不得閒暇請先生暫回束金隨後送來書箱著人和先生挑去夢鶴道何必挑書箱去如此之速也衆學父道路途跋涉寒館淒涼免先生再來夢鶴道任人之事務要勞人之苦說那裏話衆學父道雖是這說爭奈俺大家這七月要獲稻八月要耕種九月要叔苴十月要收成十一月采茶薪樗不如就此罷館便了若是束金有托無負夢鶴微知其意忽吧一聲相辭而歸悶悶無已一步分兩步正是已道無翻覆忽然猶變更貧窮當此際不忍聽蟬鳴平娘問道君一去半載回來宜喜胡爲不樂之甚毋乃以妾之故而見忌乎夢鶴道不然遂將館中被嫌緣故一一說了平娘說了怡怡自適說道君何必憂焉君不聞孔子見詛書社麛裘被謗文王拘囚美裏不殄厥慍而座無損爲聖人殿禽爲士師三黜子文爲令尹三已而卒不損爲賢者他如展出平之見放張儀之被謗馬遷之腐型者何可勝數大凡士君子卓然自命不肯與世同塵往往爲流俗謗絕大抵如斯雖然寧爲流俗所棄不爲流俗所取君何不樂天安命淡然自得而何苦乃爾乎矧俺家衣食雖不至豐裕然妾之女工亦聊足以清饑矣君何患焉夢鶴聽了歡然喜樂須妗洗爵當前夢鶴飲了數杯仰觀壁上一首詩說道這詩清逸俊雅思致蘊奇不失詩人之志也文韻一筆平娘道不必步韻別有閨怨限韻之中要存二二三四五六七八九十百千萬丈尺兩雙半妾正思索間適遇君到知懸在此請君一筆賜示夢鶴詩思泉湧頃刻間滿紙珠玉亂墜持與平娘看平娘接來一看只見上寫道萬疊雲山九曲溪十年有夢半遼西八行錦字又江鯉一盞孤燈五夜雞六七釵環羞鬢懶二三花柳妒眉交樓高百盡愁千丈四望淒涼兩淚啼平娘看完說道君有此捷才且有此秀雅真可與東漢詩人相頡頏夢鶴道鼓在內打聲不見外響賢卿嘖嘖稱譽外人慶慶謗毀教我怎麽好平娘道相識滿天下知己有幾人大抵人情多慕虛名待郎君一舉成名時即天下皆知其賢豈獨區區一漳郡乎今郎君年二十餘功名未就雖有韓陸之才李楊之學夫孰從而信之願君無怪乎流俗人也兩人談論相慰不覺日已晚了正逢六月十四夜月白風清二人開了後門到菜園中這菜園約有二丈闊四圍牆蔽外面有數叢綠竹能引清風內面有數株桐柳能勾月色芳菲陰濃麗麗鮮鮮俯仰高典既而夢鶴在月下顧盼平娘百媚千嬌宛若嫦娥下界欲心難禁抱住平娘對了一嘴要求合歡平娘道幸有先人敝廬在無端於露天之下得毋近於淫蕩之輩乎夢鶴道念夫妻情分不妨見這月下會佳期愈加生色望勿見拒平娘搖曳不肯益生嬌態夢鶴益生眷戀無奈情牽意絆即在這梧桐下石片上扶龍扶鳳同入桃源洞了那時月白風清悠忽之間黑雲滿天狂風暴起恍若神童子下降宛如十八姨懊恨平娘問道此何兆也夢鶴道天人同道蓋夫婦和而雲雨交天地和而雨澤降德澤知俺雲雨交而他亦要雨澤降也何足異哉姑置不題且說夢鶴被奸人所弄無學教讀之後人人皆藉此爲口實每年設都盡無終始多者誤無書教惟夫妻二人清粥鹽並無怨尤只樂於詩章而已忽一日鄭判軀來報道康哥哥你知之乎文宗入省約明日縣考初三府考夢鶴慌忙買了卷筆候次日入考未知進泮如何且聽下回分解
