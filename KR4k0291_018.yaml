body:
  text: 第十八回能知足衣錦還鄉詩曰知足優遊緑野堂功成身退簡遍彰歸來松菊加生色興起弦壺倍有香禦草增光秋水薄金蓮華美浮雲涼挂冠解組世風遠才子佳人喜色揚卻説康夢鶴又差人去迎請夫人原來夫人到了潮州即入門見爹娘正逢世傑林氏在家愁痛林氏忽見玉真入來吃了一驚大叫道吾兒出現了舉步欲退正在躊躇間惟世傑放些膽為指著玉真道吾兒陰靈不泯自恨命薄當早升天界不可白日現形以示怪異正是只道陰靈顯聖誰料真身復還豈比鶴歸華表宛如鳳還丹山玉真道父親母親休怕兒是生人未曾被火燒死是兒設計乃與這告其無死之由世傑大喜自不必言且説潮州知府去拜賀夢鶴夢鶴説起姚安海高仁之事及回來即差班關封鎖去拿來治罪押解廣省奈姚安海聞知自縊身死高仁即將數萬家資盡付太爺賂貺買命那太爺自思道他又非貪利之官教我如何區處幸聞大老爺夫人到太爺即張樂設筵著奶奶親自去迎接又自己親到蔔世傑家殷勤拜請玉真脆然説道妾本一介寒門女流未曾荷蒙聖恩何勞奶奶玉駕屈舍況妾那裏有此厚顔到奶奶衙門能無貽笑士君子之口乎奶奶知其必不肯去乃結彩設宴就在世傑家中那奶奶善於奉承曲意及酒至二巡説道妾聞夫人才德佳譽但必事窮見節義世亂識忠臣天欲夫人顯其名節是以生這兩個小人以磨挫夫人如今姚安海慮罪自縊高仁拘禁在監候解發落奴家想夫人憲度汪洋胸涵萬彙豈耿耿見忌這一蟻物乎謹奉白金五千兩伏乞納入幸幸玉真屢辭不受那奶奶又添五千送與卜大爺玉真道論高仁姦險情實可惡罪不容赦若論前日送轎之惠情又可恕念奶奶面上不究他罷銀再不受那奶奶道這禮若不收夫人之情雖領奴家之心何安雖薄禮不敢瀆獻特以為花粉之資而已玉真知其難卻沒奈何乃收了卻説玉真被奶奶深愛姿雅幽間不忍分別留戀數日是以過限及數匹催馬趕到奶奶即親送蔔氏起身不數日到了廣省夢鶴與母親陳氏出接玉真下轎時夢鶴屬目觀其形貌與玉真無二夢鶴道來的就是難得夫人乎玉真舉眼看陳氏陳氏無言可答惟大笑而已乃指夢鶴問道你認得此人麼夢鶴道兒當初在錦霞一見玉真一面恍然相似陳氏即與之説其來由大家歡喜夢鶴又問道夫人何來之遲也玉真即告以太爺的奶奶殷勤及説請之事夢鶴道饒他性命罷了乃遣人去請蔡斌彥夫妻來相認斌彥與許氏不敢認玉真道我即是你女兒蔡平娘也面形雖認不得但娘親生我之勞苦爹爹養我之恩情當日所做過事業兒一一都記得願爹娘不必懷疑受孩兒四拜玉真拜畢蔡斌彥乃與蔔世傑結為兄弟許氏與林氏拜為姊妹閣家歡喜正是大都苦從甘中生冷暖分離見世情假使安然居宇宙那知今日此和鳴卻説康夢鶴得了蔔玉真是夜洞房花燭之間二人説起前日之事有可笑的有可恨的有可嘉賞的有可歎異的説得情意濃濃交歡之樂比尋常人不相同時夢鶴憶前日之蔡平娘其美麗若彼今日之蔔玉真其風神若此喜以舊婚而樂新婚卜玉真思前日之蔡平娘是我今日之蔔玉真又是我既以一人之身而做兩新人二人情濃意洽時人有一首詩單道夢鶴之樂處無限情深世歎稀淡妝碧玉鬥芳菲搖曳弱柳如風嫩掩映芙蓉帶月輝醉倒煙花附鳳舞醒隨雲雨扳龍棲嬋娟解晤君堪羡牽惹揮毫魂魄飛時人又有歌一曲黃鶯兒單道那舊人變為新人的樂處成就了知心知心和諧記得嘗相尋相尋渾忘一段浴浴春嬌春嬌畫不成氣味深形銷骨霪魂飛沈九天長吟雲鎖雙禽遍體盡香侵當年鼓瑟今日又同衾蕭蕭陽臺濃濃花陰審問明又疑是昨夜夢和湛夢和湛值千金思夢鶴前日正上鸞殿徹金蓮今日又入桃源尋仙姬時人亦有一詞滿庭芳單道鶴的樂處詞曰斷腸賦斷腸篇幸得相同愒病幹葉落時花開年喜得月缺又團圓連理枝棲兩鳳凰同心結綰二鴛鴦志遂旋踵比指心戀梁案同堅天長地久應無變海誓山盟永不顛深恨光陰無再日光易遷堪慰廣寒折桂池塘采蓮碩者仰宴賜酒恍然顛倒鸞鳳天今茲洞房花燭猶然抱占有鼇頭邊朝綢繆暮綢繆閨中侶和情意綿郎愛女女憐郎探驪得意形神翩夢鶴玉真到次早齊齊起來正在間話忽然一陳秋風吹來一張紙內寫天妃娘娘四名簽詩夢鶴玉真拾來一看狂然驚歎猶疑在夢中兩人相顧倣徨因出來問母親陳氏道兒生平只因天妃娘娘四名簽詩合則離離則合悲了歡歡了悲離合悲歡顛連反覆往日日有所思夜有所夢兒今日之事莫不是夢乎陳氏道吾兒今日之事雖非夢然亦何可認為真非夢也蓋人生世了儘是夢中人也吾兒若疑為夢就是夢也即可因現在所居之夢去行可矣何必問其真哉且今日既成就了事宜焚香當天拜謝天妃娘娘之恩夢鶴覺悟盥沐焚香八拜而謝拜畢退而對玉真道萬事不由人計較算來都是命安排賢卿你前年九月初七日別離至今猶是九月初七日會合想起來豈非簽詩之意夢中之語一毫不差乎玉真道妾觀人生世上猶是春夢夢鶴道此真可謂智者道陽生於子而沈于午陰生於午而降於子蓋天下事物視以為有則有者自無視以為無則無者又有盈天地間皆物即盈天地間皆屬有無之數也夫有者春夢也無者春夢之覺也此浮屠所以一空盡之而吾儒以一理盡之空無所附以理字屬之理無所見以空字目之況吾與你觸犯天威死別三載世之人多以為虛業債未完回生再結世之人多以為妄殊不知正屬有無之數也安知昔日之死非即今日之生今日之生能定後日之死乎玉真道此論誠然妾嘗讀書至仁者壽句試問古來仁者甚多而今安在哉妾想亦是春夢也夢鶴道卿知其一未知其二蓋仁者之身是空也仁者之壽是理也何則仁者之身至今安在可見空矣但仁者之勸業德澤自一世以至萬萬世無一人不見仁者此是也況我與你寄蜉蝣於天地渺滄海之一粟昔日之春夢貧賤勞苦今日覺來于我何有今日之富貴逸樂安必非昔日之春夢也不如著有事績垂之簡編令後世傳而頌之身雖空而名不空以表春夢可矣玉真道即如俺之事績可著之簡編乎否也夢鶴道可矣吾著之使天下後世知托質寰區之數無幾凡富貴貧賤壽夭皆命所定不必藏機關結冤仇而鰓鰓淚及以圖僥幸也但吾父臨終之日曾交下書一封説待我得志之後方可展觀今功成然遂可以開矣乃虔敬展開一看別無所言只説你父將生吾兒之時夢見一鶴生得毛羽豐厚衣翼鮮妍無奈被泥壓濕不能奮飛中有一二燕雀都飛來欺侮他忽然又一雌的來與之同棲就生下一小鶴須臾一的與一小鶴子杳然不知其所之那一雄的四顧一望見有一個別雌鶴在土堆上欲飛與之頡頏奈顛連不得前兩鶴徒哀鳴而已既而一雌的視禽鳥多非其倫飛來與一雄的翺翔於九霄之遙及你父夢見這等事醒來而吾兒降生矣是以知吾兒前途雖偃蹇後來必發達要待得志之後開看乃知吾夢之有應吾言之不誣矣康夢鶴看畢回思前日本身所為的事業喟然歎曰我之一生吾父已早夢及此矣究竟皆是一夢當時有一絶為證寓形宇內其如夢自古英雄一旦休富貴貧窮天注定人生何事多心憂自是夢鶴覺悟知足辭官歸家在路遇著數位商人衣衫破碎延路求丐夢鶴聽其聲音系是自己鄉親差人去喚他近前來問數商人説是漳州人因船被風掃沈本錢罄空幸俺數人扶了船篷上岸今不得已沿途求化康夢鶴道本院認得你是某人經救康夢鶴有之乎商人道有之康夢鶴道你如今認得我否商人道不敢康夢鶴道快請起來你等皆是我恩人各送銀一百兩仍雇轎送你們歸鄉衆張人歡喜叩謝而去不題卻説康夢鶴到潮州府同玉真到梅峰庵去拜謝禪師當日收留窮途之恩夢鶴對玉真道我數年以前因尋夫人不見寄棲此庵及夫人來此進香題了緣薄才各蹤趾玉真道妾記得當時看見相公一面但不敢認又想道妾前日題二兩香銀尚未有送他今當一併送他到了庵外禪師迎入參佛坐定獻茶夢鶴謝他前日之恩無可為報今要奉白金三百兩禪師道出家人以清淨淡薄為本這銀都無用只求大老爺椽筆一揮增光山門夢鶴道這等大妙即提起筆來寫梅園山水禪師必亨八個字以贊之雲梅熟芳草滿袖襟園中菩提自知音山明幽靜無塵色水秀拓開見地心禪語圓明理樂轉師言寂滅曇花陰必然道與乾坤約亨傳曹溪歸北岑及玉真看見壁上一首詩讀雲梅峰大異木闌庵夢鶴爭如王播慚不禁笑鵬何所適愁心難對俗人談玉真對夢鶴道這詩是相公當日微賤時題的今何不和一首夢鶴又舉筆和雲當年寄食梅峰庵遐思古人聊慰慚振翮雄飛今遂志眼前宛對嫦娥談於是玉真亦援筆和一首拜斂飄零棲此庵為情絆羈耐心慚當年霧蔽不堪道今日雲開聊可談題畢二人拜別禪師回來行不數日將近漳州又遇著二人帶鎖並四個押差夢鶴視之乃鄭判軀洪袖中也停轎問之判軀道小的冤受屈禍因父親被反誣賴人命袖中道小的父親在縣為賦役被察院訪察十惡今俺二人父親年老逃出外境未知生死今文書又來拿解家屬夢鶴問判軀道你原是生員安可同鎖判軀道因前年為人訟黜退前程問了徒罪幸逢大赦夢鶴道有罪不及妻孥我為你二人解圍押差道恐違了日子夢鶴道我即寫呈交你帶去乃立寫呈狀並一名帖付押差去投遞那察院拆開一看原任廣東察院康夢鶴為懇情赦宥事痛思鄭判軀洪袖中之父一則衙蠹害良一則迫死人命罪不容赦惟念洪旆揚鄭錦園之子幾諫不從罪有可原況以髦老之父而逃出露濕風霜是責之愆也以孱懦之子欲拘代父服刑是重之罰也骨肉參商情何切至性若離心何安國法之威未加逃亡之慘已至然袖中等不忍親骸穢獄何患一身艱危但堯有自新之士舜有改過之民開一面之網可復祗合之風視如傷心可登蒼姬之世謹呈那察院看畢即批雲旆揚錦園之拋離袖中判樞之譏諫皆不足以償其罪惟念寅翁之情洪旆揚免追罪屬鄭錦園宜出棺木俱釋放嗣後這二人悔前日之非感今日之恩俯伏謝罪自不必説了且説夢鶴在任喜得雙生貴子後來俱顯名於世及榮歸之時遠方親戚並附近鄰里聞之各牽羊攜酒來相賀自是夢鶴日與玉真優遊於緑野之堂詠歌倡歎俯仰上下樂夫天命於無窮乃舉和倡所作之詩集為單家稿當世已經刊刻流傳不衰彌堅堂主人與夢鶴交契不啻膠漆之親熟悉一生所經事迹不覺因後之和樂而有感於前之坎坷憶前之坎坷而有慰後之和樂且思積惡之人其後來之報若此積善之人其後來之報若彼猶可信福善禍淫之不誣也天生賢才之不偶然也因為之作終須夢以記焉既成乃為之贊贊曰偉哉夢鶴冰霜松柏懿哉玉真堅操鐵石曰才曰佳今古無雙曰情曰節萬古不易幾回離合幾回悲歡可感可歎豐城龍劍合浦驪珠可羡可嘉霜竹雪梅平娘之節以之大江巨海其祥之情以之非節何以見其佳非情何以見其才且無平娘之節不能見夢鶴之情無夢鶴之情亦不得不顯玉真之節因為之歌曰日月可轉兮節難轉雲霧可消兮情難消情也者先天地而始後天地而終節也者參造化之德成造化之均嗟嗟微斯情兮吾誰與儔微此節兮吾何以終且微此數姦從兮吾之情節才佳何以彰
