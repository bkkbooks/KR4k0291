body:
  text: 第九回蔡平娘魂棲玉真詩曰乾天變革舊更新通共兩人爲一身藕斷亦知絲不斷魄淪又見魂難論陰陽合理無他理人鬼聯姻非別姻世上猶然未解悟請君借問蒿神卻說卜玉真自井邊和詩之後恨不得看真斯時亦有轉盼他雖未甚詳細亦曉得有一個生極俊雅然未知這詩是他詠的否自是以後終日尋思悒悵神魂夢祥茶飯少進嘗說好句有情求淑女落花無語怨東風若是那一個人他臉兒清秀身又俊性又溫且想他這一首愛情詩知他一天星鬥煥文章不枉十年窗下苦如今誰肯作針線引又不好向東鄰通殷勤又不好和我母親說出真情除非到了黃泉路才得與他結婚姻不數日睡不安坐不寧幽思昏昏香消玉減時人有歌鵲踏枝爲證見了那人吟得句兒真想了那詩念得字兒新青春年少俊俏聰明悵惹眉桃心事向誰吟愁撞心苗性命有誰憐真是有心了奈無心好多情卻被無情惱其母林氏道吾兒這幾天針線懶拈詩書不理悶悶不快懨懨瘦損爲什麽事玉真道兒非爲別事只因前日兒在花園內看女婢汲水灌花有二位秀才一個生極標致吟一首詩兒此時亦酬和他一絕未知此人是何方人氏何姓何名兒這精神是爲他牽絆敢以真情告林氏道這一個人吾兒認得真麽玉真道兒一時看見有二人未曾認真但聽他吟詩聲音似漳州人氏林氏道若是漳州人我聞有一個漳州人在這裏雇考既然敢來雇考必是大才可知然不曉得這人生得怎麽模樣林氏又想道倘他娶過了親卻怎好玉真道想他昨日之詩似斷弦未娶的林氏道兒何以知之玉真道他詩道偶遇名花惹悶時又道陽春和斷求心知吟這幾個字眼便可知是斷弦未娶的林氏道我不曉詩中意味兒試說與你母親曉得玉真道凡遇名花必喜賞何爲惹悶陽春其曲愈美而知愈寡何爲說和斷和斷定是他前有賢妻如今斷了林氏道吾兒好聰明母子正在愁悶之間聞得外面老嫗之聲叫秀才娘開門林氏即出來開了門說道原來是張媽敢問張媽到舍有何見教張媽道來到貴府總是爲著婚姻好事即因漳州有一個秀才姓蔡名允升舊年才斷了弦現今來此雇考前日遊耍到你後花園見小娘子在井邊看女婢汲水灌花不覺傷情倡和了詩情意眷戀想得廢寢忘食無奈托我來求一求其人生得美貌才學自不消說然未知卜先生肯許否林氏道若是前日和詩的人俺母子都允喜須待他父親早晚到日我自當贊助倘得許允即當一人報知於你張媽道卜先生若許允直速速報我知恐送了人性命不是耍處我今且回去罷林氏送他出門遂入內謂玉真道吾兒前日花園內所見之人確是我所說雇考之人此人姓蔡名允升果是斷弦未娶的未知你父親今晚會到否玉真聞這消息知有下落處心神漸漸安定過了二天蔔世傑到家玉真心內怡然自曠其病十分已有八分輕鬆其母林氏把前日事情逐一細細陳了一遍蔔世傑道我不曾目睹過既然中你母子之意便是好的可知那張媽聞卜世傑回來即走來探問見了世傑問道蔔先生台駕到有幾天世傑道昨晚才到又問道令千金這樁事曾聞知否世傑道吾兒誓揀擇良配至今有年矣幸得有緣中吾兒母子意定是月老推排敢問他有多少聘金值今日良辰可許他即來定聘那張婆道他說嫁女議聘乃夷狄之俗佳人配才子何用聘金蔔世傑道既無聘金要娶什麽親這個做不得林氏力勸世傑道我夫婦年已半百未有男嗣不如招他進贅以爲年老這計豈不是好蔔世傑道你婦人家所慮者淺所見者短不知他是福建人倘一旦僥心要去你我兩個老人家肯跟他去否如不肯隨他去教我怎好不如他有銀子來娶處得兩便一來歡喜吾兒得了良緣不虛生平才學之托二來我好把這銀子覓一個螟蛉子庶免絕嗣之苦且亦好做後來的棺木本豈不是一舉兩得乎林氏聽了低頭無言可答張媽道既然如此我且回去問他他若是有銀子我即刻就走來回覆他若是無銀子我也不必來了說罷就起身而去那張媽即轉來問允升不知允升是一個窮酸才子那裏有銀子定聘正是古來才子皆先貧勞若心腸情正伸漫道姻緣無聘金天光偏要困賢人且說蔔玉真這一日翹望音信直等到天晚知是不諧了心中悵然鬱鬱不樂說道吾立誓要嫁才子吾父堅意要銀子天下事那裏有這等兩全總是我終身命慳而緣薄鬱鬱數日懨懨在床形骸憔悴瘦似絲麻氣息如縷世傑看了駭然說道吾兒是何病症必速請良醫調治林氏道不消請良醫調治良醫即在你身上世傑道良醫什麽在我身上林氏道吾兒因你要索人聘金愁悶至此他說天下財利可求天下才子難得若必待有才子聘禮兩全而後嫁則將就木焉你若不回心轉念縱有扁鵲之後恐也難醫這病症世傑道這個容易你去和我女兒說知我即來去吩咐張媽乃到張媽家著他去請蔡允升速擇吉課或是要娶或是要贅任他主意張媽忻然忙忙報與允升允升即擇一良辰說要隨便進贅張媽即來報知不停刻到了世傑家聽得裏面哀哭之聲吃了一驚到得房內只見蔔玉真瞑目緘口手足冰冷嗚呼哀哉世傑夫妻相抱面哭說道吾兒你是允升害死了張媽看見說不好了轉身跑走忙忙報與允升得知說玉真爲你相思害死了允升聞之不勝悲痛有一首長相思爲記詞曰木蘭車木蘭舟萬斛相思載不浮胸臆待淹憂江潮斷江潮流十種傷心洗不瘳珠淚何日休那時卜世傑對林氏說道想起吾兒之死都是我害他與別人無干林氏道如今悔之無及雖然吾兒不幸遇著這貪財的父死也好苦總是虧我十月懷胎養他無成世聽了默然不語既而歎道倘得還魂來我就憑他主意今沒奈何我且出去買棺木來林氏道必須急去急來不可耽擱蔔世傑正要出門備辦物件忽聽得玉真有鼻息之聲既而顔色依然停了半晌玉真忽然歎了一聲說道我苦呵我康夢鶴夫君你在那裏去了你好薄認倖你好薄情世傑夫妻見玉真還魂不勝忻喜只說是胡言問道玉真我兒你回來了你父親母親在此不要胡說玉真道你是那個煩你去叫我夫君來世傑道想必是他死去去見了月老月老和他說明白了乃問道吾兒你夫君是誰玉真道我夫君姓康名夢鶴便是世傑道是了如今問有姓康名夢鶴者便可招他爲婿又問道我兒你試張了眼起來看看須是玉真張起眼來一看遂翻身在床中裏說道我苦呵我看這裏都不是我家我家在漳州我嫁與康夢鶴字其祥他是天下風流的才子我與他經生一個男子我姑姓陳氏我父姓蔡名斌彥現任廣東都司我母許氏我乃蔡平娘便是當日因六月十四夜與夫君月下會佳期觸犯天怒拆離俺夫妻恩愛今東嶽帝君憐我賢德孝慈判我回生來俚皆在我家怎麽在這裏世傑夫妻聞之不覺大駭說道我兒你說差了你名玉真你父就是我你母即是此人我兒又說什麽蔡家許家莫非是你心昏了平娘道我神清氣定那裏會昏你兒玉真在那裏請來相見世傑道玉真我兒你就是平娘笑一笑說道有這奇事我是蔡家女子名平娘怎麽又是你兒名玉真莫不是我之神魂借你兒之死魄來回生不成這也罷了我如今若要去尋蔡家之父母他不認得我縱我說出這般回生之事他亦不信不如我就把你爲親生父母你把我爲親生女兒仍做玉真不要名平娘但夢鶴與兒系百年前注定姻緣已經與兒十年夫妻了生了一個兒子年已八歲東嶽帝君責輥他亦都死了憐我賢德命未該死合與康夢鶴百年偕老希望爹爹訪問漳州此人與之實說其由蔔世傑忻然道天下有此奇奇怪怪之事恍如說夢一般我如今不免新走到漳州地方與吾兒訪問一遭林氏道前日來求吾兒這親亦說他失了妻子其才貌人家都稱他好但他又是姓蔡名允升夫妻二麽相議論又樂得無子而有子想如夢而非夢正是事不關心關心者迫理一俄聞俄聞者惑花謝花開不紀年愁眉笑眼變時刻且說蔡允升聞蔔玉真相思病死無可奈何惟有歎悼而已婚姻事自此以後渺不關心越有二日姚安海走來對允升說道蔡兄曾聞一奇事否允升道什麽奇事姚安海道蔔世傑之女死去一日回魂起來聲聲說他是漳州康夢鶴之妻名叫蔡平娘不是叫做玉真著世傑去問康夢鶴的人乃肯嫁他但康夢鶴曾來到敝地弟雖認得他而未知家居何所兄說與康夢鶴極相愛何不同來去見他一會說出蔡平娘回魂之事允升聽他這說想著前日夢中之語若醉若醒若疑若信忙忙問道果有這等實事姚安海道怎麽不是實事難道小弟騙你蔡允升道康夢鶴小弟便是姚安海笑道兄猶來說謊了康夢鶴前年曾與弟相會過你欺我忘記了麽允升亦笑道你有所不知那前年一個康夢鶴是假弟名字的我是真的乃與之說其因由姚安海聽了心尚未信說道如今憑任你有蘇張口舌亦難成就了但他說還有什麽會合的簽詩爲憑做過的事業爲證敬非真真的康夢鶴那裏知他簽詩事情允升道這個事我一一都曉的兄若不信同弟到他家說出當初緣故就不差了姚安海道好好也說得有理但兄不要說謊允升道若是假的那裏敢同兄去人家女子那裏好耍的兄不必疑也安海聽了點頭道有理有理但這樁事若得撮合兄何以謝我允升道朋友之誼謝話不消說了二人乃齊出門望世傑之家而走忽路邊沖出一個人頭戴一頂破帽身穿一領舊袍把安海扯著問道姚兄要往那裏去我和你來去趁二兩銀子姚安海道那裏去趁那人道本縣著差役緝拿漳州姓康名夢鶴字其祥的若曉得這個人去報知賞銀二兩弟聞兄書齋中宿有一個漳州朋友諒他必曉得且兄前年又曾與他相處過安海聞了這話向允升說道漳州朋友這位蔡兄就是嚇得允升魂不附體乃問道康夢鶴有何犯法要緝拿他那個道我也不曉得姚安海道既然不知明是騙我不要管他來去幹一件好事對那人道兄請了不一時到了世傑門首允升道弟與他素不相識且無針難引線弟不便唐突見他兄先進去和他說他若問你是何賃據你說現人在此他必來請我我暫在此土地廟裏候佳音姚安海道有理遂自往所門敲響叫道卜秀才在家否內林氏應道昨日書館裏去了敢問你是誰叫他什麽事姚安海道老嬸你來開門我有一句好話對你說林氏即開了門說道原來是姚叔叔你要說什麽話安海即把康夢實情告之林氏道這個是真的吾兒回生來亦說要這事體爲證如今他父親不在家不要請他來相見待我明早寄信去著他就來婚姻大事忙不在一時且吾兒去伊姑家中做客亦不在這裏你去和他說說俺決許他不必挂疑姚安海辭了林氏即來土地廟中與蔡允升一一說了允升道遲了一二日亦無妨若果有此實事任他久久亦是我的斷斷不能入他人之手姚家海道蔡兄你就敢決定了這亦未可知那蔔世傑是個貪利的腐儒倘有人慕他女兒才貌把一百八十兩銀子送與世傑安知不入他人之手乎允升道兄你不曉的他若是我前妻蔡平娘回生值此時窮勢迫亦不過輕身赴死而已斷不肯因世傑貪利而入他人之手正是腸斷夢魂結巫戀伺心相信入芝蘭說他若入庸夫手譬碎珠沈也不難卻說二人一邊說話一邊走路忽遇著查必明道弟在遍處尋兄不見兄你知事體不好了允升驚甚疑是那人說要拿康夢鶴的事已出覺了忙問道什麽事不好查必明道請來去書齋中說允升道就在這裏細聲說也不妨查必明道街到館中說亦未遲允生愈覺慌然到書齋就問道是何事體快快說來查必明道不是別事只因文宗昨日到弟每日立等出府名那知太尊性貪酷恃父爲當朝宰相每名秀才賣銀一百五十兩交七十兩與提學自己得了八十兩這提學又不是清廉之官不敢應承他只是敢怒而不敢言今進身無門休煩社兄入考弟今贈路費五兩望兄叱存萬勿見拒蔡允升道弟無寸功多謝社兄三餐愛敬安敢複貪財利查必明道弟聞君子取予以道今蔡兄路途遠聊可爲路費之資允升拱一拱說道蒙社兄深惠未知他日何以報也允升歎其命窮若此又憂其禍及若彼遂收拾行李約明早起程不知後來如何且聽下回分解
