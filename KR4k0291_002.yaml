body:
  text: 第二回逃遷後家貧葬父詩曰古來潦倒屬高賢仁孝升聞虞舜編蓼莪有詩寧可續陔華欲補不成篇既悲家業盡遷棄復苦椿永隔天石硯楊花點點落那知孤子淚無邊卻説康員外既得了麟兒定了婚禮滿面風光嘗時請客每抱夢鶴在席上那一日芍藥呈麗色黃鸝喚花朝之景請了諸友在堂開懷暢飲夢鶴隨在膝前時已有五歲諸客觀他靈敏有一人把手中所執之扇戲而問之説小兒你曉的這是什麼扇夢鶴道是鱟殼扇客雲與你對來夢鶴順口對雲虎皮裙席中稱其明敏及席中做酒令一客斟滿一盅酒傳令要席中各人俱執席中所有之物不令人知名謂傍燈過徑有燈免罰酒須將酒捧過不是燈罰酒一杯滿筵之人開手看時皆非燈名吃酒至員外錯愕無物那知夢鶴夾一魚目持與父親免罰衆人問員外如何是燈員外不曉解説夢鶴即應雲魚目夜光豈非燈乎滿席之人無不歎奇對員外説道五歲孩兒有此豁達穎悟真所謂名家之駒此君家余慶所積也可喜可賀員外道黃口小兒自愧劉景升子耳何足當諸公稱譽也正在談笑間聞那緑楊樹裏杜宇啼聲聲道不如歸去衆人大笑道酒好罷了禽鳥亦知俺醉叫俺歸去惟員外聽得心懷挹鬱把一天愁都撮在眉尖上衆人道兄胡為聞杜鵑之聲不樂員外道吾聞國家將亡必有妖孽夫莫赤匪狐莫黑匪烏此鳥乃四五月才啼哀至流血今反了常理而在此三月啼毋乃國家有變乎話説未了俄頃聞兒女之聲或叫苦的或叫慘的或哀或哭員外傾耳聽也不知何故猛見一人走將來氣衝衝把一隻手擺一擺説不好了不好了快走快走朝遷被姦臣賣弄惹數萬海寇湍邊虜掠劫殺要將邊界為巢穴宜急急收拾逃入界內免受災殃嚇得員外面如土色有口難言説道教我怎麼好遍席之人盡失意分走員外與妻子約有七口提攜繈褓逃走他鄉腰纏僅有二百金然大兵之後必有凶年時逢大旱男婦老幼飢餓溝壑呼泣動天説不盡逃走百姓扶老攜幼哀哭真個可憐但見其人亂慌慌風聲鶴唳鬧攘攘振動山岩高樓大夏一旦丘墟腴田美園變為荒冢後望故里不忍回首來看前見他鄉那個有心欣走任你仕宦貴客把不得垂頭喪志憑他小姐夫人怕不得鞋弓襪小村的俏的輾轉溝洫老的少的顛倒荒煙香閨內娉婷豔冶其淚珠兒似露滴花俏平日間激昂慷慨其愁眉尖似煙鎖柳絮枵腹的爹爹媽媽隨路號呼足痛的啼啼哭哭仰天亂叫真所謂寧作太平犬莫作流離人且説康員外乃富家苗裔懦弱書生坐食山崩把這所帶之金用吃殆盡沒奈何向妻子較量道人無生活計不怕鬥量金吾曉的藥懷賦不如把這些銀子買了藥劑好去去賣藥罷妻陳氏道雖雲人以食為天不如尋一孰去教生徒罷員外道處當今亂世之境那裏有生徒來教遂決計行醫一以施捨一以求利人人聞是貢生獻藥必然精通無論舉監生員都來請他不一年漸漸豐足庶得自安及夢鶴六歲時便知讀書員外即請一廩生是他素友姓吳名梅士為師夢鶴把詩書經傳盡力鑽研至十六歲詩賦文章三教九流等事無不精通屢科不第夢鶴乃占一卦其應落空夢鶴拂龜而謝每日愀然不樂員外安慰道吾兒有此才學真年富力強何患鵬程不遂你不聞失意則憂毋乃得意日嬌乎夢鶴道非此之謂也兒聞宋朝蔡元定學問淵源流徙道途至死不達漢馮唐才德兼優抑鬱窮年至老無聞呂尚年至八十若非文王終為渭賓之叟狂夫之譏百里奚年七十若非繆公終為扊扅之炊飯牛之謗兒每開卷未嘗不三歎息也今際此逃遷海寇未滅家業如洗兒又孱弱吾父春秋又深倘終老不達如之奈何員外道死生有命富貴在天栽者培之傾者覆之天既篤生吾兒必無空負之理願吾兒細把鐵硯磨穿螢燈雕刻吾有一封書交付與你你父知吾兒少年雖湖海飄零日後自有風雲際會之時這封書必待你得志後才可開看夢鶴承命遂雪案螢心刮垢磨光荏苒韶華復一年正逢科考應運之際不幸康員外病在床蓐夢鶴衣不解帶席不暇暖日夜嘗侍湯水之勞去考不得了正是風裏柳絮海裏波一心望靜復飄磨時華不遂男兒願司馬青衫淚濕多一日員外病危喚夢鶴吩咐道吾生不能盡父道死不能遂吾志到於今撫不得吾兒成人養不得幼子長大徒使眼中流血心內成灰我歸泉台後你幼弟尚須撫養書不誤人不可荒廢夢鶴心喉哽咽不敢放聲大哭恐傷父心只是掩淚應諾而已須臾員外緘口不言瞑目而逝夢鶴兩手抱哭俯伏躃踴至於未聲遠方鄰里文人學士有被其施藥之恩或其生平之交聞者無不奔喪吊哭正是情傷死別杜鵑號清夜聞鍾哭衰毛黃土一堆腸已斷欄杆樁淚困英豪且説夢鶴不忍薄街其父要借債厚葬陳氏止之説道你不聞喪事稱家之有無貧而厚葬不循禮也不可越分夢鶴亦思死葬之以禮乃遵了慈母之命罄家所有銀兩隨分埋葬不敢加減逮行喪明白後未知夢鶴家事如何且聽下回分解
