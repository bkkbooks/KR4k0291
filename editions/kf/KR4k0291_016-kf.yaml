body:
  text: 第十六回三及第榮授皇恩詩曰貧士求官真可憐一時登第如登天瓊花捷報閭生色禦酒啣杯容吐妍鳳閣龍門稱俊品玉堂金馬羨姿鮮休誇蓬島神仙境鼇禁徹蓮勝萬千且說玉真逃出意望霞漳來尋夢鶴一路顛顛倒倒詢途問店雖然受盡艱苦亦直任而不辭隻身路行傍人觀之有儼然不可犯之鋒時人有感而吟一絕柳營渾令實嚴威天塹江河又峻巍欲到桃源不憚遠獨行踽踽贊閨闈是夜玉真在路中吟一首寄與風月傳聞爹娘得知塞煙野草襯輕襟無奈蹇裳獨自吟不惜微軀渾是膽忍聞悲雁盡非音臨行仰祝月爲瑟須去和同風作音彈得情思難兩全只因勢迫淚淋淋不數日蔔玉真到了霞漳逐處尋訪未有蹤迹忽一日走到大街認見一位漢子腳未行而頭先趨勢如餓馬之奔江身未動而手亂擺如狂狗之爬沙冒突風雪而來者乃前日光棍也玉真正要躲身避他奈洪袖中乃是色中餓鬼雖不敢認是玉真但看見是個丰姿少年遂近前施禮問道賢兄似非本省之人敢問要尋貴産麽玉真道弟聞貴漳才子康夢鶴自來拜訪今未知康府在何處洪袖中道此乃天假之緣幸問得人夢鶴正是小弟親朋其屋與弟比鄰願先引進袖中騙他穿入偏巷曲街欺他心目認不行大街市直引到破古廟極深處內系壞牆破屋樹木叢草及玉真入門去意以爲舊柵欄袖中把廟站緊關入到廟後看見樹木茂草玉真意以爲荒埔殊不知至此四圍並無去路袖中就起不良之心要調戲他倘若不肯便要行強玉真自知中計不能脫得身去況我一介女流安能敵得他過正是冤家路隘爲濃情松柏經霜正見貞束手徬徨天地小飄飄風雨動猿聲玉真思半晌因在路中耳聞吳翰林之事忽生一計心自思道這個癡漢只可以理騙不可以力爭乃假笑臉而問道康夢鶴家在那裏你可快引我去見他我不日要這漳城到任你曉得我是誰我乃廣東吳翰林現授福建布政訪查微行到此因康夢鶴前年遊學相訓特來拜他你若不信現有文憑在身你近前來看手不要動恐汙壞我的玉真即抽出文憑與他看並讀與聽洪袖中頭如水碓心如春杵蓋那時五尺童子畢傳說吳布政尚青爲少年微行在漳州有數日其爲人忠義正直不避炎勢因彈劾朝奸被貶布政有人犯著十生九死凜然可畏你知玉真一時那裏有這文憑因被高仁告害之時太爺將一張文書判語用一顆印付玉真執炤玉真丟在他父親靴裏其靴猶是他父親嫌小不穿的因那日逃出把此其他穿在路中乃持起文書帶在身上抽出與袖中看時又把一幅紗罩在上面視得不明不亮洪袖中字又不甚深識只認得一顆大印便心內驚恐意以爲真遂跪倒請罪說道小的肉眼無珠願大老爺赦罪玉真佯爲不知說道你好意引我去見康夢鶴有何罪過我不怪你且請起來你是什麽名姓袖中道小的姓洪名袖中玉真道異日我自然看顧你袖中歡喜許諾即引到康夢鶴家中遇夢鶴去應試其母陳氏問道小官人貴姓大名要尋我兒何因玉真道我乃吳翰林便是因年兄前年遊學相熟敬來探問今既不在願入內堂借文房四寶寫一字寄此以表厚情未知尊嬸意下如何陳氏道願請老爺入內且日色已午吃了菜飯去玉真又回頭對袖中道你且回去待你到任時必須來見我袖中唯唯而去蔔玉真把門閉起脫了男服依舊女妝及陳氏在內收拾飯出來俄然一個絕色女子怪而問道你說是什麽吳翰林那裏又變做女身想你不是鬼怪是何方人氏來俺家何因從頭說來我知玉真即將前事自始至終說得明明白白陳氏的了這些言語與夢鶴所說句句相合知今見得是真不勝歡喜之至自是母子相得不消說了且說吳翰林果然訪得漳州知縣酷虐害民次日即走馬上任差役擁護族簇洪袖中遂以爲實說吳布政親許我去見他他要看顧我遂慌忙持著手本突然直入被衙役拿到台前說你這漢子好大膽敢來衝撞大老爺那吳翰林亦不待分析著差役拿下發打二十板趕出轅門洪袖中心暗想道這個翰林好薄情既許我親見他爲什麽又打我及後日聞夢鶴中了要來迎請夫人乃知前日是一個女扮男裝的夫人又思前日被毛獅王打今日又被他騙皆是我之自癡滿面羞慚不題去說康夢鶴會試中了第六名殿試中了探花聖上觀其二三場對策明亮典雅堪以理煩治劇查廣東缺了一員察院遂除授爲廣東察院聖上特旨著康夢鶴即日起程到任夢鶴領旨遂到廣東上任各屬下文武官員當來拜參那時審解康夢鶴回籍的太爺認得是前日康夢鶴有藏羞慮罪之意康夢鶴對那太爺說道你可認得本院否那太爺惶恐俯伏說道荊山璞玉肉眼何知但卑職當時勘其才猷亦識掀揭恢廓是以要大爺歸籍潛修可以早得成名不必流落他鄉今大慰鄙望伏乞恕罪康夢鶴道那裏話本院不怪你但高仁姚安海這兩奸險小人你做本府將何以教我也那太爺連連打恭道卑職回去自當效力正是男兒失意世多欺得志無人不奉持奎壁光輝揚藝海公門桃李向春滋及文武拜賀已畢閱看手本有寫蔡斌彥的名字康夢鶴道我的岳父尚在此任不免寫一名貼請他夫妻齊來相見看他說什麽話不一時長班報蔡老爺與奶奶齊到外堂康夢鶴道請蔡奶奶先入內相見那許氏入內逡巡畏縮不敢舉頭夢鶴道岳母你認不得夢鶴了許氏仰首一看乃是女婿泣道恨我女兒福薄不得共用天祿康夢鶴道你女兒活了即與之告其回生之由如今現在潮州城內前日即差人去迎接過幾日想必就到但我被岳父告得忒害幾乎喪了性命許氏道我亦常常勸他奈他執意說吾兒不報他知如今可喜可賀望吾兒將前事赦落千頃波流萬幸康夢鶴道待兒出外見他看他如何乃出外堂相見康夢鶴尊他上坐蔡斌彥推遜不已康夢鶴道敬你是客不妨就坐蔡斌彥將眼角把察院一看恍如女婿一樣但他沈船死恐是人貌相似康夢鶴問道本院閱觀前任舊案有一件究償女命事都是年翁尊名未知曾得究償命否若是未完案本院即爲年翁親提償命未知尊意若何蔡斌彥愴惶不安稟道那同大老爺尊諱的就是卑職女婿今不幸沈船身故了康夢鶴道既是年翁女婿女兒雖死不過命數該終豈有夫婦相得而下毒手打死乎你該寫一書封去罵他說緣何不報你知便罷了因何告償命害他致之死地是年翁失德之甚也若然則康夢鶴之死是你害之也你能爲女兒告償自終之命我今要爲康夢鶴告償迫死之命上表奏過聖上說你陷害無辜書生把你禁劾天牢活活餓死你信乎不信嚇得蔡斌彥面無紅色揖了又揖說道求大老爺恕卑職性命願乞骨骸歸本鄉康夢鶴笑了一笑叫左右領蔡斌彥退入後堂與許氏相見許氏見丈夫來笑容滿面起來迎接正是貧窮則父母不子富貴則親戚畏懼一聲雷震霹靂天燕雀魂飛棲不住那斌彥看見許氏歡樂異常問道我這等憂愁你因何這等歡喜許氏道樂人之樂憂人之憂不相同也蔡斌彥道我觀此大老爺恍似我女婿許氏道若是女婿你還敢見他蔡斌彥道你不曉得倘是女婿居此地位福大量必大安肯責備此小事乎許氏道害人性命還是小事虧你敢說許氏乃與之實告其由蔡斌彥羞慚滿面按下不題再說那時廣東文宗到任要往潮州歲考康夢鶴即薦查必明進泮及科考陳天英錯落第三等不得鄉試適許文泰除授山西泌縣知縣路經廣東省入拜夢鶴陳說天英三等之事夢鶴即薦天英斯時總裁官與康夢鶴乃系同門即青眼陳天英遂中了第十五名去說許文泰到泌縣到任後出來城隍廟拈香路遇一族人追趕一個漢子聲聲唱打看見縣尊來衆人拘到轎前跪稟說老爺敕命小的這三四人被這光棍騙害得淒慘旰日白晝乘其不虞攻其無備入內偷小人衣被銀兩今他穿的衣服被小的認著乃呼衆人捉捕幸遇青天伏乞追究以儆將來文泰詰問件件皆真究其人乃當日在潮州府騙康夢鶴銀兩包袱之邵福也文泰登時打了四十板追贓還後即解到廣東康夢鶴台前待罪斯時夢鶴本要處死他以杜民害奈邵福磕頭聲聲說道老爺救蟻殘命小的自今以後悔去前日之非願削髮出家夢鶴憐其有回頭之念即赦他逐出邵福自是悔悟就在廣省庵堂修行又過了數日肇慶府百姓來呈告知縣貪酷虐民夢鶴勘其三十四款贓證皆實原來就是數年前亂棍打夢鶴賣放人夫的趙知縣如今已除授在此康夢鶴知其暗昧貪酷又兼款證確實即特上本題參欽奉聖旨禦批削職爲民歸家免究欽此欽遵等事姑勿題卻說康夢鶴上任之時即差一班家丁去漳州搬請母親並胞弟赴任又差一班往潮州迎請玉真家眷未知玉真迎來否且聽下回分解
