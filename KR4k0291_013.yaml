body:
  text: 第十三回幸有緣客鄉相會詩曰久別重逢萬解開呼童酌酒幸無災遐思前事淚將墜近説今時心暫回早喜去霓一旦起雨時虹蝀忽然來佳人才子真磨挫避了狂風又懼雪卻説蔔玉真既用計脫出姦人之手終日懨懨朝夕懸望針線無心拈脂粉懶去添意以為今而後不復望其祥在世矣縱有詩章對合皆屬虛假矣因作蝶戀花詞以志悲思雲詞曰獨坐孤房淚如水追憶當年觸天威只道妾亡君在世那知妾在君反死君既死兮妾無主飄泊滄海有誰知痛妾奇回何所益不如仍赴泉台去時人嘉其節操有歌天淨沙一首為證詞曰黃昏後悲來欲解全憑酒全憑酒只憑酒醒悲情還又有難解薑桂耐心久此情未識君知否君知否惟求來世天長地悠一日其母林氏對玉真説道以我之鄙見夢鶴還在玉真道母親有何高見林氏道倘夢鶴不在這裏他小畜生怎知俺要討簽詩為證就有簽詩來復曉得假做夢鶴安知不是他在漳州和朋友説乎玉真道大抵是當年與朋友説亦未可知林氏道詩固不足疑那裏知俺要求夢鶴乎玉真默默不語按下不題且説康夢鶴自商船救活之後追憶蔡平娘遙想蔔玉真肝膽如割不能一刻忘也忽見洪袖中來説道康兄恭喜恭喜夢鶴愕然道兄恭什麼喜洪袖中道弟前日往潮州府買布情意真切專為兄去報沈船未死得人救蘇這樁事早與令嶽知消息聞尊嫂被玉帝殿前毛獅差玉女仙姬扶來尋兄做夫妻康夢鶴道兄胡為青天白日説鬼話乎袖中道非是鬼話是弟親眼見的兄若不信有如皎日夢鶴笑道又來説慌了方才正説耳聞今復説親見我問你親見毛獅王生得什麼模樣説什麼話洪袖中道毛獅王生得毛長身黑手執楊柳把一個假兄名字的亂打説他是光棍敢來設計騙康夢鶴之妻我差玉女仙姬將玉真化去還夢鶴我要把這光棍活活打死這事弟乃同一族人擁門入去尋看果然見毛獅王騰空升天惟世傑夫妻尋不見玉真相抱而哭夢鶴聽其言語説得有理而且親切仰天歎道夢鶴何其命之蹇也又想道耳聞不如目睹我明日不免借些盤費往探真實斯時夢鶴之弟生理趁有五兩銀子並求借五兩共湊十兩之數交與兄夢鶴説道窮室莫窮路倘姻緣湊巧得成亦要些銀子費用夢鶴不辭欣然接過手來即時起身正是端士從來正直思毒心偏喜惹人悲不知虛實有主張到底弄姦獨自欺卻説康夢鶴到了潮州府徑往蔔世傑家去看見門關得緊緊的再往後門一觀只見滿地生緑苔鎖著一把大鎖頭不覺驚疑依舊轉到前門向那鄰人問道請問大哥可知卜世傑連家眷那裏去了鄰人道他往別處去住了康夢鶴道請問他為什麼別處去住那鄰人道都是為著他一個女兒那個女兒又是為著漳州一個康夢鶴害得他顛連苦慘康夢鶴道弟聞他一個女兒説被毛獅王化不見了有此事否那鄰人道這個説起來好一場大笑話只因一個光棍假做康夢鶴寫詩對合一夜要成親那知玉真英烈智謀知他是假冒的就裝做毛獅王手執楊柳條打得那光棍抱頭鼠竄康夢鶴道這個就好了怎用搬家別處去住那鄰人道你有所不知因康夢鶴被禍解省玉真要去救他到了半路聞他沈船沒奈何歇在鄉村人家裏誰知冤家歇得乃是監生高仁極是豪富一時窺見玉真美麗意有所圖遂來與姚安海商量那知姚安海就是康夢鶴的仇人與之設計用白金一百兩托媒婆持到世傑家裏説西關外監生高仁是卜秀才熟識的寄來銀一百兩著我特來説放在秀才家裏世傑力辭不許他寄那張婆説秀才你不要怕寄銀子是好事秀才若要用任從你用他若與秀才討有我在此那知世傑原是貪利的人心內暗暗想道高仁未曾當面交銀與我那裏敢來與我討銀若是張媽來取即便還他怕他有麼詭計與他寄亦不妨張媽見世傑收了即時別去玉真聽得這事忙對世傑道爹爹不該收他的銀收他這銀子是速之禍也古雲無端獲福禍心隨這他明明是貪圖孩兒爹爹何以墮其術中世傑道他是富貴人家兒子生得相貌堂堂即交兒嫁他亦妙玉真道爹爹你當速速拿去還他倘若不肯兒便身死不知爹爹是要銀子或是要孩兒世傑聞得女兒要死之話即刻將銀子送還張媽張媽倚勢就變臉説道你既收高監生的聘銀怎麼送來還我蔔世傑道誰見我取他聘銀張媽道幹證姚安海現見媒人是我現交嚇得蔔世傑心慌將一百兩銀子擲在桌上抽身便走回到家中將這話説與林氏母子得知玉真聽了尋思無計因説道孩兒生死總是為著康夢鶴一個冤家不如身死斷了這般禍根遂自縊數次幸世傑夫妻救免現今母子相離得無奈何乘夜逃出外方未知住在何處康夢鶴聽得這話不覺面目焦悴又不曉得從那一處去尋起正是塞北孤飛無樹依江南失旅徒欷茫茫宇宙尋何處為情牽絆自依依卻説康夢鶴念切要見玉真而不可得垂頭喪志遂往大街裏去不幸被姚安海窺見姚安海想道這個畜生果然未死不免叫人去請高兄來設下一計把他害死斷了玉真念頭玉真自然肯嫁高兄決定了計且按下不題卻説玉真乘夜逃去那個得知魚蕩蕩四海那處尋起夢鶴無計暫宿舊交朋友書館中那知鄰屋一個漢子姓邵名福亦識些文字慣習口舌聞知康夢鶴有銀假意入館親交知夢鶴要尋玉真説道兄要見的人莫是卜秀才名世傑公夢鶴道正是此人邵福道這個弟曉的康夢鶴聽了欣然道兄既曉得是弟三生有幸了希賴鼎力引弟去見他另日自當報答決不敢忘邵福道弟過蒙雅愛自當效勞安敢望報只因卜秀才與弟家兄為友甚然莫逆凡遇有事必請家兄較量剖然後施行弟因家兄所以識他但他與弟不過一面之交而已當時乘夜逃出外方諒必與家兄商量在家兄必然知之康夢鶴道既是如此煩兄引弟去見令兄何如邵福道這個做不得弟之家兄住在鄉里離城二百餘裏如兄必欲親到勢必動費經營不如弟自往問他蔔家消息便可得知康夢鶴道這等敢煩兄明早就走何如邵福道瞞得兄昨日與人納了一件要緊事情因夥計每人派出銀五十兩要入山煉礦弟尚欠銀十兩弟有一位至親朋友名角有用約明日要借弟弟必在此等他康夢鶴道煉礦如何迢福道天財地寶有福者每月趁得三二千兩康夢鶴道朋友要借兄未必就有弟現帶有十兩銀子借與兄兄好明日和弟去問資訊遂拿出銀子交與邵福道這銀十兩足足在此邵福接過手來揖了一揖道多謝厚愛銘刻五內弟斷非小人之輩另日自當如數奉還卜秀才之事弟明早就行兄不必罣慮遂相揖而別正是人面獸心難得知世情艱險波濤危只因擇財為情絆秋雨淒涼不勝悲邵福去了夢鶴直等了七八日並無音信去問鄰人鄰人説道這個人入山去煉礦了夢鶴即入山尋見了邵福邵福不勝故喜沽酒買殺與夢鶴酬飲説道弟前日承兄囑託來家兄處問消息來至半路被夥計扯入山來無奈寫一張字説其緣由並與家父借銀十兩交弟親朋名角有用轉送兄處未知兄曾收否康夢鶴道弟不曾見面今日專為此事而來邵福勃然大怒説道知人知面不知心假作歎聲不絶又説道酒罷了弟與兄同去見他以表弟一點丹心兩人一路全行夢鶴身系一個包袱只是幾件衣巾袴襪而已邵福道弟空身兄這包袱與弟代勞夢鶴思這嶺崎嶇亦固辭就交他負那知邵福負至半路故意入林出恭逃走不見了虧夢鶴一身穿行藍藍縷縷又不好去見朋友在路踟蹰仰天歎息幸遇梅峰禪師進而問道貧僧視尊官舉動必是斯文君子其身體破碎容貌帶憂莫不是在患難中乎敢問緣由如何夢鶴即與告其實情禪師道可見人心之不同如其面如今進退兩難莫若且到庵中吃些齋飯看些經籍未蔔尊意如何康夢鶴聽了歡喜拱一拱道這等多謝了康夢鶴隨同梅峰禪師到庵住了月餘時有題詩一首為證暫寄梅庵荒徑幽眼前動興作清流半肩雲水添春夢滿地煙波入夜愁風亂松聲欺古壁月斜峰影挂危樓詩愴達人何處晚度疏鍾出遠丘卻説康夢鶴在庵無衣無褐棲身無所兼舉動是大儒氣象素不能逢他往往取怨於人而夢鶴略不芥蒂一心只在玉真身上日夜相思要見他一面而不可得那知天緣湊巧一日蔔玉真同母親林氏到庵中進香叫和尚持緣薄來上面寫著信士蔔世傑之女玉真喜舍香銀二兩正傍還寫了幾個小小的字即住在錦霞村及玉真看轎要回時撞見夢鶴兩人相顧若有熟面之意若有眷戀之情夢鶴見玉真上轎去了心內想道此女容貌好似前日後園所見的莫非此人就是玉真麼忙入庵內問和尚方才來的女子姓名和尚交緣薄與他看夢鶴展開一看見是蔔玉真名字不覺欣欣大喜説道原來冤家就在這裏即日向朋友借了衣巾徑往錦霞村來問那知這錦霞村就是蔔世傑設教之處世傑有一妹嫁在此村中玉真母子就住在他家夢鶴直到書館中問教書先生説道請問先生可曉得卜秀才卜世傑住在那裏蔔世傑道你問他怎麼康夢鶴道晚生乃霞漳人姓康名夢鶴今到此要來拜他但世傑本是斯文人豈不曉得斯文人見他説是康夢鶴乃將他上下一看只見生得玉影翩翩瓊樹瑤林丰姿皎皎璞玉渾金神凝秋水貌繪華琳春風吐面詩思滿心膚耀光彩骨帶文琛素稱人瑞當世長吟九齡風度傳名至今問誰得似夢鶴同音蔔世傑看了喜其人物清秀儀容俊爽心內暗暗想道這人諒不是光棍與他説也不妨乃對夢鶴道小弟賤名就是世傑夢鶴聽了深深一揖道晚生入慕尊範時切懷仰奈命薄禍臨不克親聆玄誨徒抱歉耳今何幸得親光霽大慰渴思蔔世傑道小弟居鄉鄙人學悝疏淺那堪尊官法眼未知有何指教康夢鶴道晚生因前者尊嬸對姚安海親許晚生兼葭依玉晚生幸以為良緣佳會就奉令承教無何橫罹羅網風雨飄搖流落至今幸而獲生實僥幸于萬一如今敬來拜訪未卜尊叔果不食言否那蔔世傑道久慕芳名亦嘗逢人説項斯矣但處今之世光棍甚多諒兄非其倫也然弟亦必問小女主意蓋主婚須待父母之命而擇壻要遂女兒之願終身大事不可草草兄請暫坐弟去就來蔔世傑即入內與林氏母女説道外面有一個書生在書齋中説是康夢鶴言談如此如此生得如何如何玉真道不如請他親來待兒捉空私自看他一看才得放心卜世傑即請康夢鶴入內玉真一見果然父親説得不差心內想道誠恐別有才子考他詩章也不相干不如問他當年行事原文下缺
