body:
  text: 終須夢清彌堅堂主人編目錄第一回解簽詩指腹爲婚第二回逃遷後家貧葬父第三回蔡斌彥厭貧退親第四回注生廟誓約花燭第五回爲衣食星蔔設教第六回遭大變妻子俱亡第七回因遊學喜逢詩友第八回康夢鶴客齋夜夢第九回蔡平娘魂棲玉真第十回被奸人陷害沈船第十一回卜玉真聞凶盡節第十二回變一策打走光棍第十三回幸有緣客鄉相會第十四回出意外被奸拆離第十五回處勢窮設計脫身第十六回三及第榮授皇恩第十七回接回雁惆悵兇信第十八回能知足衣錦回鄉
