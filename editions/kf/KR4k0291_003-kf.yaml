body:
  text: 第三回蔡斌彥厭貧退親詩曰時事猶如風興波炎涼忽見世情多仙郎無計尋鳥鵲織女複思渡碧河黃葉寒林蟬噪語青松綠竹鳥吟哦夫妻本是同心結父母嫌貧無奈何卻說康夢鶴既葬了父家業罄空窮困徹骨無以糊口居則忽忽若有所忘出則昏昏不識所之起坐明月之中吟詩二首其一薄宵睡不得起坐獨悲吟明月照吾閭清風吹我襟途窮身自健命蹇事多臨靜誦白雲句古人可慰心其二寂寂銀釭懸淚垂飛杜鵑出門盡荊棘舉目有深淵昔慮風連雨今憂雨接煙太行山絕望空守齏鹽煎至明早陳氏呼夢鶴來前因勸他道吾兒須覓一個生活計不可困守詩書坐以待斃夢鶴道兒非不想這事但思要去舌耕則無人薦引要去肩挑則身體懦弱要承爹之業則不諳藥性若要著自己之藝則突然而出未免怕羞猶豫數日不知怎生的好望母親指示陳氏道吾兒多才多藝之人也既不願出頭面以求蠅頭微利何不效班超蕭何筆吏傭書後爲宰相封侯者乎夢鶴沈思了半晌說道兒雖不材不過命運未亨而已亦猶明月暫被黑雲遮黃河尚有澄清時今既不得上登雲路已可愧矣而乃故意入幽谷毋乃貽高士君子之林乎陳氏道吾兒雖賢未及文宣萬萬文宣又嘗爲委吏乘田不避羞辱即子輿氏所謂抱關擊柝其職亦稱大凡君子有經有權今正吾兒行經權之時也羞胡爲哉夢鶴想了一想說道也罷兒思府縣衙門政事紛繁易擾心神兒父臨終之時叮嚀兒不可荒廢詩書渢渢在耳倘入此途便廢本業不如投在巡檢司衙中清淨庶不失棘關素志敢問母親尊意何如陳氏道兒自思穩貼便好不過要求錐刀之末而已豈要吾兒終身就此爲活哉那知衙署淡薄雖入去傭書而所衣者百結之衣所穿者東郭之履往往見棄於群小不幸又遇此巡司爲人暗昧貪酷一日上司差督民夫往築城池一名夫私放銀五錢那一日點少了三名夫你道這三名人夫原來差役權折作銀稱要交康相公過付誰知此差人複往別鄉銀尚未交巡司巡司輒差內丁去問鄉民鄉里的人都說康相公遣人來折去了那巡司竟不待分辯默然具一稟貼報縣縣主大怒朱批即拿康夢鶴回話至晚坐堂衙役拿到立在階下縣主道你爲何不跪康夢鶴道童生無罪何跪之有縣主怒道敢說你無罪朝廷民夫你好大膽擅自私放是何道理康夢鶴道情實虛誣有誰見證縣主道你本官現證豈有你本官自賣而誣賴你手擲下四枝簽發打夢鶴夢鶴堅執不屈說道飽學書生打不得小童生不過暫屈傭書而已非比衙役之輩且實無弄權真情決打不得縣官愈怒喝差役將竹板亂打打得一身黑爛走亦走不動著差役趕出回家免究嗟嗟夢鶴真個可憐以平日激昂慷慨英雄自命至此因家貧之幫而受這苦楚羞辱如之奈何特師友憐惜之各有詩慰問其詩甚多不錄惟記得吳先生一首詩雲停杯不飲意殷殷思象有牙身致焚欲效執鞭希求富何如閉戶勤論文雖雲窮困正相迫孰識智愚自此分湛負性心應增益古來俊傑多如君又有一友鄭判軀乃錦園之子心雖僥險文理稍通與康夢鶴世交亦慰一首詩雲問君何事蹙眉貧且向花前看暮春歲月易遷人易老乾坤當志當伸難缺必須缺皦皦無塵終有塵吾輩未亭多偃蹇可憐和寡辱金身又有一友姓洪名袖中其爲人奸險驕傲腹無點文好交高明賢士以慕虛名並不自知其分量亦勉強作一首來慰詩雲禍不單行運未來福無雙至且有災勸君休得多愁慮有山不怕無燒柴卻說夢鶴被打之後母子相抱而哭虧了他母親與鄰里辟纑傭雇食一餐餓一餐養了數日稍能行動即到師友書館中謝詩見了洪袖中說多謝兄盛心做詩相慰愧弟襪線短材有辱一一知己休笑休笑袖中有誇之能之意說道總是命運未亨誰敢笑兄昨日之詩弟甚愛惜兄未知兄既得否夢鶴道弟亦知是愛惜但其中有藹然深沈處弟未曾覺悟願兄勿吝雲泥開塞袖中道弟這詩不只矜憐兄且願兄後日發達夢鶴道多謝多謝敢問兄做詩學業是誰袖中道詩不過字要多寡相對詞要長短相參便盡了詩之能事何必學業弟皆聰明句也夢鶴道兄差了俗雲三年讀成舉子十年學不成詩翁詩非錦心繡口曠達不羈之才不能道只字詩正未可容易輕之也袖中怪其有藐他遂拂然道論兄之才是欲壓倒元白乎夢鶴弟不願自比楊汝士兄亦安可自稱元白乎但朋友之義有善相賞有疑相析要願兄後日推敲爲佳夢鶴知其無受益之心禮意稍疏遂拱了一拱告別出門袖中亦不眷戀他袖中竊自說道自病不能醫延街賣嗽藥他自己把一書算尚做不成還敢誇他才學明明是奚落我了遂抱恨在心不題正是奸人匿怨外相親弄起禍胎有一因玉石相須各從類才高難合庸流身他日康夢鶴抑鬱在家悶悶不樂含羞忍恥出遊街市忽見一族旌旗傘蓋坐著一位官人前呼後擁乘馬而來夢鶴冷眼一覰乃岳丈蔡斌彥也遂要躲親藏拙間已被他屬目看見了蔡斌彥心中自思要問他不便乃揚鞭過身去但眼中觀其衣衫藍褸狀如喪家之犬心內十分不快原來蔡斌彥因吊征山賊有功除授湖廣指揮現今又超升廣東都司才給文憑告假歸家卻說這斌彥一武夫之流那裏曉得什麽才子不過趨炎避冷已耳見康夢鶴這等窮酸落薄歸來對他妻許氏說道你知康家貧辱之事乎許氏道自夫君別後俺母子只是閉戶勤針指窗前觀古書並不管一毫閒事但前日聞得行路人歎道康其祥有這般丰采偉略無故充爲書役於今被打深可痛傷未知其祥是何人蔡斌彥道其祥即是夢鶴的字我昨日去拜客在街上遇著他看他形體枯槁衣冠破爛不知羞恥還敢在街市中搖擺這樣人終非發達之器我今想了一計喚家僮去請他來把聘禮假做送他爲家資還他去別娶你母子好同我一齊到任我可在那任中選一個膏梁子弟匹配吾兒亦不負吾兒一生受用豈不是好許氏力勸道他亦是富貴兒子今雖落薄安知後日不富貴乎當日成亦是君今日敗也是君姻緣大事那裏這等兒戲蔡斌彥道你不曉貧窮之艱苦一日難度過一日今我把銀子與他生涯庶免饑餓他吾兒亦可得了一個佳婿豈不是兩便平娘侍在母親身傍聞他爹這等言語粉頭低垂蛾眉顰蹙既而兩頰通紅正色說道兒聞忠臣不事二主烈女不嫁二夫既受了聘千金不移豈容變更蔡斌彥道婦有三從在家從父你父主意是要你好處吾兒苦什麽平娘道共薑其生死且不改縱連理之枝可破而比目之魚難分之死矢靡鐵石之矢只何不諒兒乎蔡斌彥低首無言心內思想忽歎一聲說道悶殺我了罷了我自有道理不過多以金帛酢他正是冷暖頓殊深可憂天時人事兩悠悠花枝矢卻東皇主雨雨風風那得休且說平娘自幼從母教養到十四五歲時真果秀氣所鍾天地陰陽不爽有百分姿色自有百分聰明便知書能文竟已成一個女流學士是以蔡斌彥愛寵他不忍落貧賤之家使之憔悴勞苦誤了一世風光至明日斌彥默遣家僮往康家去請夢鶴夢鶴對母親說道蔡岳丈除升廣東都司領文憑歸家兒爲半子愧無樽酒洗塵反蒙辱愛先施如之奈何其母陳氏道人之相知貴相知心俺家淡薄你岳父必聞知他念及表親重之以婚媾況你父在日與他把臂談心如膠如漆今來請你必是不怪你我這頭上一枝簪簪你可持去買幾件禮物付他家僮帶去送他聊表一片悃忱之敬夢鶴領命遂借了衣冠同他家僮往見斌彥那知斌彥備了白金五十兩綾緞款端及家僮報說康相公到了斌彥出門親迎入堂坐定茶罷說道多煩台下賁臨康夢鶴道岳父說那裏話愚婿不孝罪深緣父棄世家事蕭條禮意疏闊徒鬱結心血耳幸得嶽父高升方恨拜賀無具非不欲通殷勤但尋思了無取今嶽父念及先父前交之情遣使寵召則大幸焉何出此言謹備些菲儀聊表鄙忱萬望此存幸幸蔡斌彥道何須多貲請問賢侄如今作何生涯康夢鶴思道此人必有異志怎麽叫我賢侄且莫管看他是何舉動且應道兒不過一介書生日以筆墨爲勾鋸以詩書爲田疇斫情耘耔無時休暇兒之生涯如斯而已若別有生涯必多本錢兒所不識蔡斌彥道吾亦知賢侄無本錢是以備白金五十兩要付賢侄去生理倘發大財時要擇佳配豈無貴宅豪門之女況你表妹平娘要隨我上任去未知何年何月得回恐誤賢侄青春未蔔尊意如何康夢鶴聽得這話心胸湧然正容危坐說道岳父你曉得貧賤之交不可忘糟糠之妻不下堂你勿輕視兒處今日窮苦有辱蒹葭倚玉乎斌彥道不然吾聞君子當知變通今賢侄這等貧窮權將這銀去做本錢倘後日發達再擇佳配詎不善甚何必執一康夢鶴道岳父非此之意也豈不聞自古英賢多磨挫大困之後必有大亨我學成滿腹文章胸羅象數氣吐雲霞思入雲中今雖困抑譬鵠未羽不日定奇錦標奮力一擊萬里之遙豈藩籬之鷃所能料乎蔡斌彥道不必誇口做過才是如我當日數百盟兄弟只得我一名僥倖官正未易做也夢鶴道岳父這等說是欺兒日後不能成名乎就將今日來論你雖區區做了一個武夫豈遂能勝我堂堂一書生乎即我之家風有不若你乎抑我之品詣有不若你乎斌彥艴然變色默默不語夢鶴道罷了你要退親憑你退親我何慕金帛之有卻不道書中有女顔如玉乎遂忙忙抽身出門去了斌彥怒其狂妄對家人道這個人終日誇言大語胡思亂想不久訊到顛不要管他等他瘋顛了正來處置未遲嗟嗟富貴則親戚畏懼貧窮則婚姻不許正是反躬自問信真賢不必求人然不然富貴吐言顛亦正貧窮出話正猶顛許氏與平娘在後堂聽得夢鶴這話對平娘說道這人雄才偉略言談皆琳琅唾笑成先王不墜青雲之志愈令人可愛可敬決不可輕忽他我自然有區處即喚一個丫鬟去等他出門請他到這花園私軒中我可說些言語安慰他並可與之設下一策來娶倘跟你父親去廣東大爲不便乃吩咐丫鬢去候他那知丫鬟候他已久坐在此石上打睡夢鶴怒氣洶洶向路直走足如蓬轉挨在丫鬟身邊過那丫鬟醒時夢鶴離身已遠任丫鬟叫夢鶴絕不回頭了丫鬟回報說他不肯來平娘柳眉低蹙杏臉生愁忽長歎一聲不題那許氏亦嘗力勸斌彥說這婚姻乃憑天後娘娘爲媒簽詩爲記未出母胎時已先注定了況且當日與表舅相交如雷同如管鮑雲你我之私到於今變了封倘我君百歲後何面目見舅親手斌彥沈吟半晌喟然歎道叫他有銀子火速來娶去就罷不然若隨我到任裏去那裏關山阻遠悔之無及許氏即退與平娘商量如此如此喚丫鬟去請夢鶴不知夢鶴來否且聽下回分解
